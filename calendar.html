<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Academic Calendar | NOORUSSALAM MADRASA</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ─── RESET & BASE ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Anek Malayalam', 'Inter', sans-serif;
        }

        body {
            background: #f0f4fe;
            min-height: 100vh;
            padding: 16px;
            color: #1a1a2e;
            position: relative;
            overflow-x: hidden;
        }

        /* ─── ANIMATED BACKGROUND ─── */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(124, 58, 237, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(249, 115, 22, 0.02) 0%, transparent 50%);
            animation: floatBg 30s infinite alternate ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes floatBg {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, -2%) rotate(2deg); }
            50% { transform: translate(-1%, 3%) rotate(-1deg); }
            75% { transform: translate(3%, 1%) rotate(3deg); }
            100% { transform: translate(-2%, -3%) rotate(-2deg); }
        }

        .calendar-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ─── MADRASA HEADER ─── */
        .madrasa-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.8rem 2rem 1.2rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 40px -12px rgba(0, 0, 0, 0.06), 0 0 60px rgba(59, 130, 246, 0.04);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .madrasa-header::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: pulseGlow 8s infinite alternate ease-in-out;
        }

        .madrasa-header::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.04) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: pulseGlow 6s infinite alternate-reverse ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        .madrasa-header .brand-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .madrasa-header .logo-icon {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #1e3a5f, #3b82f6);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 30px;
            font-weight: 800;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.25);
            flex-shrink: 0;
            transition: transform 0.3s;
            animation: logoFloat 3s infinite alternate ease-in-out;
        }

        @keyframes logoFloat {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-4px) rotate(2deg); }
        }

        .madrasa-header .logo-icon:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        .madrasa-header .title-group h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a1a2e;
            margin: 0;
            line-height: 1.2;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1a1a2e, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        .madrasa-header .title-group .subtitle {
            font-size: 0.9rem;
            color: #4b5563;
            font-weight: 500;
            margin-top: 2px;
        }

        .madrasa-header .title-group .reg-info {
            font-size: 0.75rem;
            color: #6b7280;
            background: rgba(59, 130, 246, 0.06);
            padding: 2px 16px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
            font-weight: 500;
            letter-spacing: 0.3px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.04);
        }

        .madrasa-header .calendar-headline {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px solid rgba(59, 130, 246, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .madrasa-header .calendar-headline h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0;
        }

        .madrasa-header .calendar-headline h2 i {
            color: #3b82f6;
            margin-right: 8px;
            animation: iconWiggle 3s infinite ease-in-out;
        }

        @keyframes iconWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .madrasa-header .calendar-headline .academic-year {
            font-size: 0.8rem;
            color: #6b7280;
            background: rgba(255, 255, 255, 0.6);
            padding: 2px 16px;
            border-radius: 40px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            font-weight: 600;
            backdrop-filter: blur(8px);
        }

        /* ─── NAVIGATION ─── */
        .calendar-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 0.8rem 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 24px -8px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.7s ease-out 0.1s both;
        }

        .calendar-nav .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .calendar-nav .nav-left .month-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1a2e;
            min-width: 120px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .calendar-nav .nav-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: #1a1a2e;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .calendar-nav .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(124, 58, 237, 0.1));
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 50%;
        }

        .calendar-nav .nav-btn:hover {
            background: #ffffff;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.12);
            border-color: rgba(59, 130, 246, 0.15);
            transform: translateY(-2px) scale(1.05);
        }

        .calendar-nav .nav-btn:hover::before {
            opacity: 1;
        }

        .calendar-nav .nav-btn:active {
            transform: scale(0.92);
        }

        .calendar-nav .btn-today {
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            border: none;
            padding: 7px 20px;
            border-radius: 60px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 0.8rem;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.2);
            position: relative;
            overflow: hidden;
        }

        .calendar-nav .btn-today::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .calendar-nav .btn-today:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 28px -6px rgba(59, 130, 246, 0.35);
        }

        .calendar-nav .btn-today:hover::after {
            opacity: 1;
        }

        .calendar-nav .btn-today:active {
            transform: scale(0.95);
        }

        .calendar-nav .btn-refresh {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: #6b7280;
        }

        .calendar-nav .btn-refresh:hover {
            background: #ffffff;
            color: #3b82f6;
            transform: rotate(180deg) scale(1.05);
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.08);
        }

        .calendar-nav .btn-refresh .fa-spin {
            animation: fa-spin 1s linear infinite;
        }

        /* ─── CALENDAR GRID ─── */
        .calendar-grid-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 12px 48px -12px rgba(0, 0, 0, 0.04), 0 0 80px rgba(59, 130, 246, 0.02);
            overflow: hidden;
            animation: slideDown 0.7s ease-out 0.2s both;
            position: relative;
        }

        .calendar-grid-container::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-grid .day-name {
            text-align: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: #6b7280;
            padding: 10px 0 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(0, 0, 0, 0.04);
            position: relative;
        }

        .calendar-grid .day-name::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 25%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.15), transparent);
            border-radius: 4px;
        }

        .calendar-grid .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 8px 4px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: default;
            position: relative;
            border: 1.5px solid transparent;
            min-height: 76px;
        }

        .calendar-grid .day-cell::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), transparent);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .calendar-grid .day-cell:hover::before {
            opacity: 1;
        }

        /* ─── DATE NUMBER – COLOR CODED ─── */
        .calendar-grid .day-cell .day-number {
            font-weight: 700;
            font-size: 1.4rem;
            line-height: 1.3;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .calendar-grid .day-cell .day-number.color-default {
            color: #1a1a2e;
        }
        .calendar-grid .day-cell .day-number.color-exam {
            color: #f97316;
        }
        .calendar-grid .day-cell .day-number.color-holiday {
            color: #ef4444;
        }
        .calendar-grid .day-cell .day-number.color-event {
            color: #3b82f6;
        }
        .calendar-grid .day-cell .day-number.color-assignment {
            color: #3b82f6;
        }
        .calendar-grid .day-cell .day-number.color-other {
            color: #8b5cf6;
        }

        .calendar-grid .day-cell.has-event .day-number {
            text-shadow: 0 0 20px currentColor, 0 0 60px currentColor;
            animation: glowPulse 3s infinite alternate ease-in-out;
        }

        @keyframes glowPulse {
            0% {
                text-shadow: 0 0 20px currentColor, 0 0 60px currentColor;
                opacity: 0.9;
            }
            100% {
                text-shadow: 0 0 30px currentColor, 0 0 80px currentColor, 0 0 120px currentColor;
                opacity: 1;
            }
        }

        .calendar-grid .day-cell.other-month .day-number {
            opacity: 0.35;
            text-shadow: none !important;
            animation: none !important;
        }

        .calendar-grid .day-cell.today .day-number {
            font-weight: 800;
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-thickness: 2.5px;
            text-decoration-color: currentColor;
        }

        .calendar-grid .day-cell.today {
            background: rgba(59, 130, 246, 0.06);
            border-color: rgba(59, 130, 246, 0.15);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.04);
        }

        .calendar-grid .day-cell.selected {
            background: rgba(59, 130, 246, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08), 0 8px 32px rgba(59, 130, 246, 0.06);
            transform: scale(1.02);
        }

        .calendar-grid .day-cell.has-event {
            cursor: pointer;
        }

        .calendar-grid .day-cell.has-event:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.08);
            border-color: rgba(59, 130, 246, 0.15);
        }

        .calendar-grid .day-cell .event-dots {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .calendar-grid .day-cell .event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s;
            animation: dotPulse 2s infinite alternate ease-in-out;
        }

        .calendar-grid .day-cell:hover .event-dot {
            transform: scale(1.3);
        }

        .calendar-grid .day-cell .event-dot.exam {
            background: #f97316;
            animation-delay: 0s;
        }
        .calendar-grid .day-cell .event-dot.holiday {
            background: #ef4444;
            animation-delay: 0.3s;
        }
        .calendar-grid .day-cell .event-dot.assignment {
            background: #3b82f6;
            animation-delay: 0.6s;
        }
        .calendar-grid .day-cell .event-dot.event {
            background: #3b82f6;
            animation-delay: 0.9s;
        }
        .calendar-grid .day-cell .event-dot.other {
            background: #8b5cf6;
            animation-delay: 1.2s;
        }

        @keyframes dotPulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .calendar-grid .day-cell .event-count-badge {
            font-size: 0.55rem;
            background: rgba(0, 0, 0, 0.04);
            color: #6b7280;
            padding: 0 7px;
            border-radius: 20px;
            font-weight: 700;
            margin-top: 2px;
            line-height: 1.5;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        /* ─── LEGEND ─── */
        .calendar-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 28px;
            padding: 16px 0 4px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            margin-top: 14px;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .calendar-legend .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4b5563;
            transition: all 0.3s;
            cursor: default;
            padding: 4px 10px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .calendar-legend .legend-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            background: rgba(255, 255, 255, 0.6);
        }

        .calendar-legend .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 6px;
            flex-shrink: 0;
            transition: transform 0.3s;
        }

        .calendar-legend .legend-item:hover .legend-dot {
            transform: scale(1.2) rotate(10deg);
        }

        .calendar-legend .legend-dot.exam {
            background: #f97316;
        }
        .calendar-legend .legend-dot.holiday {
            background: #ef4444;
        }
        .calendar-legend .legend-dot.event {
            background: #3b82f6;
        }
        .calendar-legend .legend-dot.other {
            background: #8b5cf6;
        }

        /* ─── EVENT DETAIL PANEL ─── */
        .event-detail-panel {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-top: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px -8px rgba(0, 0, 0, 0.04);
            display: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideDown 0.5s ease-out;
        }

        .event-detail-panel.visible {
            display: block;
        }

        .event-detail-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .event-detail-panel .panel-header h5 {
            font-weight: 700;
            color: #1a1a2e;
            margin: 0;
            font-size: 1rem;
            background: linear-gradient(135deg, #1a1a2e, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .event-detail-panel .panel-header h5 i {
            color: #3b82f6;
            margin-right: 6px;
        }

        .event-detail-panel .panel-close {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 0;
        }

        .event-detail-panel .panel-close:hover {
            background: #ef4444;
            color: #fff;
            transform: rotate(90deg) scale(1.05);
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.15);
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .event-list::-webkit-scrollbar {
            width: 4px;
        }
        .event-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.02);
            border-radius: 10px;
        }
        .event-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3b82f6, #7c3aed);
            border-radius: 10px;
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            border-left: 4px solid #3b82f6;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideIn 0.4s ease-out both;
        }

        .event-item:nth-child(1) { animation-delay: 0.05s; }
        .event-item:nth-child(2) { animation-delay: 0.1s; }
        .event-item:nth-child(3) { animation-delay: 0.15s; }
        .event-item:nth-child(4) { animation-delay: 0.2s; }
        .event-item:nth-child(5) { animation-delay: 0.25s; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .event-item:hover {
            background: rgba(255, 255, 255, 0.9);

    <script>
        // ════════════════════════════════════════════════════════════════
        //  CONFIGURATION – REPLACE WITH YOUR DEPLOYED URL
        // ════════════════════════════════════════════════════════════════
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyJFFOk6QT9bbGaO1ZVqCFtc4UmDUqPcAFoMJNIP5WkQNl6heGhI5y2CREoYRoVXk0hPQ/exec';

        // ─── FALLBACK DATA (used when network fails or sheet is empty) ───
        const FALLBACK_EVENTS = [
            { date: '2026-01-05', title: '📘 Mid-Term Exams Begin', type: 'exam', description: 'Mid-term exams start.' },

            { date: '2026-02-20', title: '📝 Maths Assignment', type: 'assignment', description: 'Submit your homework.' },
            { date: '2026-02-25', title: '🎭 Annual Day Function', type: 'event', description: 'Grand celebration – 6:00 PM.' },
            { date: '2026-03-01', title: '📘 Final Exams Begin', type: 'exam', description: 'Final exams commence.' },
            { date: '2026-03-10', title: '🏆 Prize Distribution', type: 'event', description: 'Merit certificates & trophies.' },
            { date: '2026-03-15', title: '🌸 Spring Break', type: 'holiday', description: 'Spring vacation begins.' },

            { date: '2026-04-01', title: '📝 English Assignment', type: 'assignment', description: 'Submit your project.' },
            { date: '2026-04-05', title: '🌙 Ramadan Mubarak', type: 'holiday', description: 'Campus closed for Ramadan.' },
            { date: '2026-04-10', title: '📖 Quran Quiz', type: 'event', description: 'Inter-class quiz – 10:00 AM.' },
            { date: '2026-04-15', title: '📘 Unit Test – Week 1', type: 'exam', description: 'Unit test (Day 1).' },
            { date: '2026-04-16', title: '📘 Unit Test – Week 2', type: 'exam', description: 'Unit test (Day 2).' },
            { date: '2026-04-20', title: '🎓 Career Counseling', type: 'event', description: 'For Class 9 & 10 – 11:00 AM.' },
            { date: '2026-05-01', title: '🌿 Summer Vacation Begins', type: 'holiday', description: 'Summer break starts.' },
            { date: '2026-06-01', title: '📅 School Reopens', type: 'event', description: 'New academic year.' },
            { date: '2026-06-10', title: '📘 Orientation Day', type: 'event', description: 'For new students & parents.' },
            { date: '2026-06-15', title: '📝 Summer Project', type: 'assignment', description: 'Submit your summer project.' },
            { date: '2026-06-20', title: '🏅 Inter-School Debate', type: 'event', description: 'Team selection & practice.' },
            { date: '2026-07-01', title: '📘 Mid-Term Exams', type: 'exam', description: 'Mid-term exams (July 1–10).' },
            { date: '2026-07-05', title: '🇺🇸 Independence Day', type: 'holiday', description: 'National holiday – 8:30 AM.' },
            { date: '2026-07-15', title: '📝 Social Studies Project', type: 'assignment', description: 'Submit your project.' },
            { date: '2026-07-20', title: '🎭 Drama & Arts Festival', type: 'event', description: 'Annual drama festival.' },
            { date: '2026-08-01', title: '📘 Final Exams', type: 'exam', description: 'Final exams (Aug 1–15).' },
            { date: '2026-08-10', title: '🏆 End of Year Ceremony', type: 'event', description: 'Certificate distribution.' },
            { date: '2026-08-15', title: '🎉 Summer Break', type: 'holiday', description: 'Summer vacation begins.' },
        ];

        // ════════════════════════════════════════════════════════════════
        //  STATE
        // ════════════════════════════════════════════════════════════════
        let eventsData = [];
        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth();
        let selectedDate = null;
        let isLoading = false;

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        const gridEl = document.getElementById('calendarGrid');
        const monthLabel = document.getElementById('monthLabel');
        const panel = document.getElementById('eventDetailPanel');
        const panelDateLabel = document.getElementById('panelDateLabel');
        const panelEventList = document.getElementById('panelEventList');
        const panelCloseBtn = document.getElementById('panelCloseBtn');
        const prevBtn = document.getElementById('prevMonthBtn');
        const nextBtn = document.getElementById('nextMonthBtn');
        const todayBtn = document.getElementById('todayBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const statusLabel = document.getElementById('statusLabel');
        const toastContainer = document.getElementById('toastContainer');

        // ════════════════════════════════════════════════════════════════
        //  TOAST NOTIFICATION
        // ════════════════════════════════════════════════════════════════
        function showToast(message, type = 'success') {
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span class="toast-icon"><i class="fas ${icons[type] || icons.info}"></i></span>
                <span>${message}</span>
            `;
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('toast-out');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ════════════════════════════════════════════════════════════════
        //  HELPERS
        // ════════════════════════════════════════════════════════════════
        function formatDateKey(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function getEventsForDate(year, month, day) {
            const key = formatDateKey(year, month, day);
            return eventsData.filter(e => e.date === key);
        }

        function getDayColorClass(events) {
            if (events.length === 0) return 'color-default';
            const types = events.map(e => e.type);
            if (types.includes('exam')) return 'color-exam';
            if (types.includes('holiday')) return 'color-holiday';
            if (types.includes('assignment') || types.includes('event')) return 'color-event';
            if (types.includes('other')) return 'color-other';
            return 'color-default';
        }

        function getEventTypeIcon(type) {
            const map = {
                exam: 'fa-pencil-alt',
                holiday: 'fa-umbrella-beach',
                assignment: 'fa-file-alt',
                event: 'fa-calendar-check',
                other: 'fa-circle'
            };
            return map[type] || 'fa-calendar-day';
        }

        function getEventTypeLabel(type) {
            const map = { exam: 'Exam', holiday: 'Holiday', assignment: 'Assignment', event: 'Event', other: 'Other' };
            return map[type] || 'Event';
        }

        // ════════════════════════════════════════════════════════════════
        //  FETCH EVENTS FROM GOOGLE SHEET (with fallback)
        // ════════════════════════════════════════════════════════════════
        async function loadEvents() {
            if (isLoading) return;
            isLoading = true;
            statusLabel.textContent = '⏳ Loading…';
            statusLabel.style.color = '#3b82f6';

            try {
                // Show loading state
                gridEl.innerHTML = `
                    <div class="loading-spinner" style="grid-column:1/-1;text-align:center;padding:40px 0;color:#6b7280;">
                        <i class="fas fa-spinner fa-pulse fa-2x" style="color:#3b82f6;"></i>
                        <p style="margin-top:12px;font-weight:500;">Loading events from Google Sheets…</p>
                    </div>
                `;

                // ─── Check if URL is configured ──────────────────────────
                if (SCRIPT_URL === 'YOUR_DEPLOYED_SCRIPT_URL_HERE') {
                    throw new Error('SCRIPT_URL not configured. Please set your deployed URL.');
                }

                const resp = await fetch(`${SCRIPT_URL}?action=getEvents&t=${Date.now()}`, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status} – ${resp.statusText}`);
                }

                const data = await resp.json();

                if (data.result === 'success') {
                    if (data.length > 0) {
                        eventsData = data;
                        statusLabel.textContent = `✅ ${eventsData.length} events loaded from Sheets`;
                        statusLabel.style.color = '#10b981';
                        showToast(`✅ Loaded ${eventsData.length} events from Google Sheets`, 'success');
                    } else {
                        // Sheet exists but has no events → use fallback
                        eventsData = FALLBACK_EVENTS;
                        statusLabel.textContent = '📋 No events in sheet – using fallback data';
                        statusLabel.style.color = '#f59e0b';
                        showToast('📋 Your sheet is empty – using sample data', 'info');
                    }
                } else {
                    // Script returned an error
                    eventsData = FALLBACK_EVENTS;
                    statusLabel.textContent = '⚠️ Script error: ' + (data.message || 'Unknown');
                    statusLabel.style.color = '#ef4444';
                    showToast('⚠️ Script error – using fallback data', 'error');
                }
            } catch (err) {
                console.error('Network error:', err);
                eventsData = FALLBACK_EVENTS;
                statusLabel.textContent = '⚠️ ' + err.message;
                statusLabel.style.color = '#ef4444';
                showToast('⚠️ ' + err.message + ' – using fallback data', 'error');
            }

            renderCalendar(currentYear, currentMonth);
            const today = new Date();
            onDayClick(today.getFullYear(), today.getMonth(), today.getDate());
            isLoading = false;
        }

        // ════════════════════════════════════════════════════════════════
        //  RENDER CALENDAR
        // ════════════════════════════════════════════════════════════════
        function renderCalendar(year, month) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const today = new Date();
            const todayY = today.getFullYear();
            const todayM = today.getMonth();
            const todayD = today.getDate();

            let html = '';

            dayNames.forEach(name => {
                html += `<div class="day-name">${name}</div>`;
            });

            const prevMonth = month === 0 ? 11 : month - 1;
            const prevYear = month === 0 ? year - 1 : year;
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += renderDayCell(prevYear, prevMonth, day, true, todayY, todayM, todayD);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                html += renderDayCell(year, month, day, false, todayY, todayM, todayD);
            }

            const totalCells = firstDay + daysInMonth;
            const remaining = (7 - (totalCells % 7)) % 7;
            const nextMonth = month === 11 ? 0 : month + 1;
            const nextYear = month === 11 ? year + 1 : year;
            for (let day = 1; day <= remaining; day++) {
                html += renderDayCell(nextYear, nextMonth, day, true, todayY, todayM, todayD);
            }

            gridEl.innerHTML = html;
            monthLabel.textContent = `${monthNames[month]} ${year}`;
        }

        function renderDayCell(year, month, day, isOtherMonth, todayY, todayM, todayD) {
            const dateKey = formatDateKey(year, month, day);
            const events = getEventsForDate(year, month, day);

            const isToday = (year === todayY && month === todayM && day === todayD);
            const isSelected = selectedDate && selectedDate.getFullYear() === year &&
                selectedDate.getMonth() === month &&
                selectedDate.getDate() === day;

            let classes = 'day-cell';
            if (isOtherMonth) classes += ' other-month';
            if (isToday) classes += ' today';
            if (isSelected) classes += ' selected';
            if (events.length > 0) classes += ' has-event';

            const colorClass = getDayColorClass(events);

            let dotsHtml = '';
            const types = events.map(e => e.type);
            const uniqueTypes = [...new Set(types)];
            uniqueTypes.forEach(type => {
                dotsHtml += `<span class="event-dot ${type}"></span>`;
            });

            let badgeHtml = '';
            if (events.length > 1) {
                badgeHtml = `<span class="event-count-badge">${events.length}</span>`;
            }

            return `
                <div class="${classes}" data-date="${dateKey}" onclick="onDayClick(${year}, ${month}, ${day})">
                    <span class="day-number ${colorClass}">${day}</span>
                    ${dotsHtml ? `<div class="event-dots">${dotsHtml}</div>` : ''}
                    ${badgeHtml}
                </div>
            `;
        }

        // ════════════════════════════════════════════════════════════════
        //  DAY CLICK & DETAILS
        // ════════════════════════════════════════════════════════════════
        window.onDayClick = function(year, month, day) {
            const dateObj = new Date(year, month, day);
            selectedDate = dateObj;

            document.querySelectorAll('.day-cell').forEach(el => el.classList.remove('selected'));
            const target = document.querySelector(`.day-cell[data-date="${formatDateKey(year, month, day)}"]`);
            if (target) target.classList.add('selected');

            showEventDetails(dateObj);
        };

        function showEventDetails(dateObj) {
            const events = getEventsForDate(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
            const year = dateObj.getFullYear();
            const month = dateObj.getMonth();
            const day = dateObj.getDate();

            panelDateLabel.textContent = `${monthNames[month]} ${day}, ${year}`;

            if (events.length === 0) {
                panelEventList.innerHTML = `
                    <div class="no-events-msg">
                        <i class="fas fa-calendar-minus me-2"></i>No events on this day.
                    </div>
                `;
            } else {
                let html = '';
                events.forEach(ev => {
                    const iconClass = ev.type || 'event';
                    const icon = getEventTypeIcon(iconClass);
                    const label = getEventTypeLabel(iconClass);
                    html += `
                        <div class="event-item">
                            <div class="event-icon ${iconClass}"><i class="fas ${icon}"></i></div>
                            <div class="event-info">
                                <div class="event-title">${ev.title}</div>
                                <div class="event-meta">
                                    ${ev.description ? `<span>${ev.description}</span>` : ''}
                                    <span class="event-badge ${iconClass}">${label}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                panelEventList.innerHTML = html;
            }

            panel.classList.add('visible');
        }

        // ════════════════════════════════════════════════════════════════
        //  NAVIGATION
        // ════════════════════════════════════════════════════════════════
        function navigateMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) { currentMonth = 11;
                currentYear--; } else if (currentMonth > 11) { currentMonth = 0;
                currentYear++; }
            renderCalendar(currentYear, currentMonth);

            if (selectedDate) {
                const selY = selectedDate.getFullYear();
                const selM = selectedDate.getMonth();
                if (!(selY === currentYear && selM === currentMonth)) {
                    panel.classList.remove('visible');
                    document.querySelectorAll('.day-cell').forEach(el => el.classList.remove('selected'));
                    selectedDate = null;
                } else {
                    const selD = selectedDate.getDate();
                    onDayClick(selY, selM, selD);
                }
            }
        }

        // ════════════════════════════════════════════════════════════════
        //  EVENT LISTENERS
        // ════════════════════════════════════════════════════════════════
        prevBtn.addEventListener('click', () => navigateMonth(-1));
        nextBtn.addEventListener('click', () => navigateMonth(1));

        todayBtn.addEventListener('click', function() {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderCalendar(currentYear, currentMonth);
            onDayClick(currentYear, currentMonth, today.getDate());
        });

        refreshBtn.addEventListener('click', function() {
            const icon = this.querySelector('i');
            icon.classList.add('fa-spin');
            loadEvents().finally(() => {
                setTimeout(() => icon.classList.remove('fa-spin'), 600);
            });
        });

        panelCloseBtn.addEventListener('click', function() {
            panel.classList.remove('visible');
            document.querySelectorAll('.day-cell').forEach(el => el.classList.remove('selected'));
            selectedDate = null;
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') navigateMonth(-1);
            else if (e.key === 'ArrowRight') navigateMonth(1);
            else if (e.key === 'Escape') {
                panel.classList.remove('visible');
                document.querySelectorAll('.day-cell').forEach(el => el.classList.remove('selected'));
                selectedDate = null;
            }
        });

        // ════════════════════════════════════════════════════════════════
        //  INIT
        // ════════════════════════════════════════════════════════════════
        // Check if SCRIPT_URL is set
        if (SCRIPT_URL === 'YOUR_DEPLOYED_SCRIPT_URL_HERE') {
            statusLabel.textContent = '⚠️ Set SCRIPT_URL';
            statusLabel.style.color = '#ef4444';
            console.warn('⚠️ Please set your SCRIPT_URL in the JavaScript configuration.');
            // Use fallback data immediately
            eventsData = FALLBACK_EVENTS;
            renderCalendar(currentYear, currentMonth);
            const today = new Date();
            onDayClick(today.getFullYear(), today.getMonth(), today.getDate());
            showToast('⚠️ Set SCRIPT_URL in the code', 'error');
        } else {
            loadEvents();
        }
    </script>

</body>
