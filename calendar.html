<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Academic Calendar | NOORUSSALAM MADRASA</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Anek Malayalam', 'Inter', sans-serif;
        }

        body {
            background: #f0f4fe;
            min-height: 100vh;
            padding: 16px;
            color: #1a1a2e;
        }

        .calendar-wrapper {
            max-width: 1100px;
            margin: 0 auto;
        }

        .madrasa-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.8rem 2rem 1.2rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 40px -12px rgba(0, 0, 0, 0.06);
            text-align: center;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .madrasa-header .brand-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .madrasa-header .logo-icon {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #1e3a5f, #3b82f6);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 30px;
            font-weight: 800;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.25);
            flex-shrink: 0;
        }

        .madrasa-header .title-group h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .madrasa-header .title-group .subtitle {
            font-size: 0.9rem;
            color: #4b5563;
            font-weight: 500;
        }

        .madrasa-header .title-group .reg-info {
            font-size: 0.75rem;
            color: #6b7280;
            background: rgba(59, 130, 246, 0.06);
            padding: 2px 16px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }

        .madrasa-header .calendar-headline {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px solid rgba(59, 130, 246, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .madrasa-header .calendar-headline h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0;
        }

        .madrasa-header .calendar-headline h2 i {
            color: #3b82f6;
            margin-right: 8px;
        }

        .madrasa-header .calendar-headline .academic-year {
            font-size: 0.8rem;
            color: #6b7280;
            background: rgba(255, 255, 255, 0.6);
            padding: 2px 16px;
            border-radius: 40px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            font-weight: 600;
        }

        .calendar-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 0.8rem 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 24px -8px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .calendar-nav .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .calendar-nav .nav-left .month-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1a2e;
            min-width: 120px;
            text-align: center;
        }

        .calendar-nav .nav-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #1a1a2e;
            font-size: 0.9rem;
        }

        .calendar-nav .nav-btn:hover {
            background: #ffffff;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.12);
            transform: translateY(-2px);
        }

        .calendar-nav .btn-today {
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            border: none;
            padding: 7px 20px;
            border-radius: 60px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.2);
        }

        .calendar-nav .btn-today:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 28px -6px rgba(59, 130, 246, 0.35);
        }

        .calendar-nav .btn-refresh {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s;
            color: #6b7280;
        }

        .calendar-nav .btn-refresh:hover {
            background: #ffffff;
            color: #3b82f6;
            transform: rotate(180deg);
        }

        .calendar-grid-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 12px 48px -12px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-grid .day-name {
            text-align: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: #6b7280;
            padding: 10px 0 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(0, 0, 0, 0.04);
        }

        .calendar-grid .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 8px 4px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
            cursor: default;
            position: relative;
            border: 1.5px solid transparent;
            min-height: 76px;
        }

        .calendar-grid .day-cell .day-number {
            font-weight: 700;
            font-size: 1.4rem;
            line-height: 1.3;
            transition: all 0.3s;
        }

        .calendar-grid .day-cell .day-number.color-default {
            color: #1a1a2e;
        }
        .calendar-grid .day-cell .day-number.color-exam {
            color: #f97316;
        }
        .calendar-grid .day-cell .day-number.color-holiday {
            color: #ef4444;
        }
        .calendar-grid .day-cell .day-number.color-event {
            color: #3b82f6;
        }
        .calendar-grid .day-cell .day-number.color-assignment {
            color: #3b82f6;
        }
        .calendar-grid .day-cell .day-number.color-other {
            color: #8b5cf6;
        }

        .calendar-grid .day-cell.has-event .day-number {
            text-shadow: 0 0 20px currentColor, 0 0 60px currentColor;
        }

        .calendar-grid .day-cell.other-month .day-number {
            opacity: 0.35;
            text-shadow: none !important;
        }

        .calendar-grid .day-cell.today .day-number {
            font-weight: 800;
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-thickness: 2.5px;
        }

        .calendar-grid .day-cell.today {
            background: rgba(59, 130, 246, 0.06);
            border-color: rgba(59, 130, 246, 0.15);
        }

        .calendar-grid .day-cell.selected {
            background: rgba(59, 130, 246, 0.08);
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
            transform: scale(1.02);
        }

        .calendar-grid .day-cell.has-event {
            cursor: pointer;
        }

        .calendar-grid .day-cell.has-event:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.08);
        }

        .calendar-grid .day-cell .event-dots {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .calendar-grid .day-cell .event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .calendar-grid .day-cell .event-dot.exam {
            background: #f97316;
        }
        .calendar-grid .day-cell .event-dot.holiday {
            background: #ef4444;
        }
        .calendar-grid .day-cell .event-dot.assignment {
            background: #3b82f6;
        }
        .calendar-grid .day-cell .event-dot.event {
            background: #3b82f6;
        }
        .calendar-grid .day-cell .event-dot.other {
            background: #8b5cf6;
        }

        .calendar-grid .day-cell .event-count-badge {
            font-size: 0.55rem;
            background: rgba(0, 0, 0, 0.04);
            color: #6b7280;
            padding: 0 7px;
            border-radius: 20px;
            font-weight: 700;
            margin-top: 2px;
            line-height: 1.5;
        }

        .calendar-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 28px;
            padding: 16px 0 4px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            margin-top: 14px;
            justify-content: center;
        }

        .calendar-legend .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4b5563;
            padding: 4px 10px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .calendar-legend .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .calendar-legend .legend-dot.exam {
            background: #f97316;
        }
        .calendar-legend .legend-dot.holiday {
            background: #ef4444;
        }
        .calendar-legend .legend-dot.event {
            background: #3b82f6;
        }
        .calendar-legend .legend-dot.other {
            background: #8b5cf6;
        }

        .event-detail-panel {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-top: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px -8px rgba(0, 0, 0, 0.04);
            display: none;
            animation: slideDown 0.5s ease-out;
        }

        .event-detail-panel.visible {
            display: block;
        }

        .event-detail-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .event-detail-panel .panel-header h5 {
            font-weight: 700;
            color: #1a1a2e;
            margin: 0;
            font-size: 1rem;
        }

        .event-detail-panel .panel-close {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .event-detail-panel .panel-close:hover {
            background: #ef4444;
            color: #fff;
            transform: rotate(90deg);
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            border-left: 4px solid #3b82f6;
            transition: all 0.3s;
        }

        .event-item:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(6px);
        }

        .event-item .event-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .event-item .event-icon.exam {
            background: rgba(249, 115, 22, 0.12);
            color: #f97316;
        }
        .event-item .event-icon.holiday {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
        }
        .event-item .event-icon.assignment {
            background: rgba(59, 130, 246, 0.12);
            color: #3b82f6;
        }
        .event-item .event-icon.event {
            background: rgba(59, 130, 246, 0.12);
            color: #3b82f6;
        }
        .event-item .event-icon.other {
            background: rgba(139, 92, 246, 0.12);
            color: #8b5cf6;
        }

        .event-item .event-info {
            flex: 1;
            min-width: 0;
        }

        .event-item .event-info .event-title {
            font-weight: 600;
            color: #1a1a2e;
            font-size: 0.85rem;
        }

        .event-item .event-info .event-meta {
            font-size: 0.7rem;
            color: #6b7280;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 1px;
        }

        .event-item .event-badge {
            font-size: 0.55rem;
            font-weight: 700;
            padding: 1px 12px;
            border-radius: 40px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .event-item .event-badge.exam {
            background: rgba(249, 115, 22, 0.1);
            color: #f97316;
        }
        .event-item .event-badge.holiday {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .event-item .event-badge.assignment {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }
        .event-item .event-badge.event {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }
        .event-item .event-badge.other {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
        }

        .no-events-msg {
            text-align: center;
            color: #9ca3af;
            padding: 20px 0;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 14px;
            border-left: 4px solid #3b82f6;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1a1a2e;
            animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toast.success {
            border-left-color: #10b981;
        }
        .toast.error {
            border-left-color: #ef4444;
        }
        .toast.info {
            border-left-color: #3b82f6;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        .calendar-footer {
            text-align: center;
            color: #9ca3af;
            margin-top: 1.8rem;
            padding-bottom: 0.5rem;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .calendar-footer i {
            margin-right: 4px;
        }

        .calendar-footer .footer-divider {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: #d1d5db;
            border-radius: 50%;
            margin: 0 8px;
            vertical-align: middle;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .madrasa-header { padding: 1.2rem 1rem 0.8rem; }
            .madrasa-header .logo-icon { width: 50px; height: 50px; font-size: 22px; }
            .madrasa-header .title-group h1 { font-size: 1.3rem; }
            .calendar-nav { padding: 0.6rem 1rem; }
            .calendar-nav .nav-left .month-label { font-size: 0.9rem; min-width: 80px; }
            .calendar-grid-container { padding: 0.8rem; }
            .calendar-grid { gap: 2px; }
            .calendar-grid .day-cell { min-height: 56px; padding: 4px 2px; }
            .calendar-grid .day-cell .day-number { font-size: 1.05rem; }
            .calendar-grid .day-cell .event-dot { width: 6px; height: 6px; }
            .calendar-legend { gap: 6px 14px; }
            .calendar-legend .legend-item { font-size: 0.65rem; }
            .event-detail-panel { padding: 0.8rem 1rem; }
        }

        @media (max-width: 400px) {
            .calendar-grid .day-cell { min-height: 44px; }
            .calendar-grid .day-cell .day-number { font-size: 0.9rem; }
            .calendar-grid .day-cell .event-dot { width: 5px; height: 5px; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #3b82f6, #7c3aed); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="calendar-wrapper">

        <header class="madrasa-header">
            <div class="brand-top">
                <div class="logo-icon">ن</div>
                <div class="title-group">
                    <h1>NOORUSSALAM MADRASA</h1>
                    <div class="subtitle">KAMBIPPALAM · KERALA ESTATE</div>
                    <div class="reg-info"><i class="fas fa-certificate me-1"></i> under SKIMVB, Reg No: 6110</div>
                </div>
            </div>
            <div class="calendar-headline">
                <h2><i class="fas fa-calendar-alt"></i> Academic Calendar</h2>
                <span class="academic-year"><i class="far fa-calendar-alt me-1"></i> 2025 – 2026</span>
            </div>
        </header>

        <nav class="calendar-nav">
            <div class="nav-left">
                <button class="nav-btn" id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
                <span class="month-label" id="monthLabel">January 2026</span>
                <button class="nav-btn" id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="nav-right">
                <button class="btn-today" id="todayBtn"><i class="fas fa-calendar-day me-1"></i> Today</button>
                <button class="btn-refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
            </div>
        </nav>

        <div class="calendar-grid-container">
            <div class="calendar-grid" id="calendarGrid"></div>

            <div class="calendar-legend">
                <span class="legend-item"><span class="legend-dot exam"></span> Exam</span>
                <span class="legend-item"><span class="legend-dot holiday"></span> Holiday</span>
                <span class="legend-item"><span class="legend-dot event"></span> Event</span>
                <span class="legend-item"><span class="legend-dot other"></span> Other</span>
                <span class="legend-item" style="border-color:transparent;background:transparent;cursor:default;">
                    <i class="fas fa-cloud-upload-alt" style="color:#3b82f6;font-size:0.8rem;"></i>
                    <span id="statusLabel" style="font-weight:400;color:#9ca3af;">Loading…</span>
                </span>
            </div>

            <div class="event-detail-panel" id="eventDetailPanel">
                <div class="panel-header">
                    <h5><i class="fas fa-list-ul"></i> Events for <span id="panelDateLabel">January 15, 2026</span></h5>
                    <button class="panel-close" id="panelCloseBtn"><i class="fas fa-times"></i></button>
                </div>
                <div id="panelEventList" class="event-list"></div>
            </div>
        </div>

        <div class="calendar-footer">
            <i class="fas fa-shield-alt"></i> Noorussalam Madrasa
            <span class="footer-divider"></span>
            <i class="fas fa-calendar-check"></i> Academic Calendar
            <span class="footer-divider"></span>
            <i class="fas fa-cloud"></i> Google Sheets
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ════════════════════════════════════════════════════════════════
        //  CONFIGURATION – REPLACE WITH YOUR DEPLOYED URL
        // ════════════════════════════════════════════════════════════════
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxDCdJTUnduRWo4Yj_hggdt60-1eDEa4-rv06lMct9N6BAMf10ghDItqamFZRP-ozqzcg/exec';

        // ─── FALLBACK ───────────────────────────────────────────────────
        const FALLBACK_EVENTS = [
            { date: '2026-07-16', title: 'മിഅറാജ്', type: 'event', description: 'മിഅറാജ് ദിനം' },
            { date: '2026-01-26', title: 'Republic Day', type: 'holiday', description: 'National holiday.' },
        ];

        // ════════════════════════════════════════════════════════════════
        //  STATE
        // ════════════════════════════════════════════════════════════════
        let eventsData = [];
        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth();
        let selectedDate = null;

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        const gridEl = document.getElementById('calendarGrid');
        const monthLabel = document.getElementById('monthLabel');
        const panel = document.getElementById('eventDetailPanel');
        const panelDateLabel = document.getElementById('panelDateLabel');
        const panelEventList = document.getElementById('panelEventList');
        const panelCloseBtn = document.getElementById('panelCloseBtn');
        const prevBtn = document.getElementById('prevMonthBtn');
        const nextBtn = document.getElementById('nextMonthBtn');
        const todayBtn = document.getElementById('todayBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const statusLabel = document.getElementById('statusLabel');
        const toastContainer = document.getElementById('toastContainer');

        // ════════════════════════════════════════════════════════════════
        //  TOAST
        // ════════════════════════════════════════════════════════════════
        function showToast(message, type = 'success') {
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="toast-icon"><i class="fas ${icons[type] || icons.info}"></i></span><span>${message}</span>`;
            toastContainer.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300); }, 3500);
        }

        // ════════════════════════════════════════════════════════════════
        //  HELPERS
        // ════════════════════════════════════════════════════════════════
        function formatDateKey(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function getEventsForDate(year, month, day) {
            const key = formatDateKey(year, month, day);
            return eventsData.filter(e => e.date === key);
        }

        function getDayColorClass(events) {
            if (events.length === 0) return 'color-default';
            const types = events.map(e => e.type);
            if (types.includes('exam')) return 'color-exam';
            if (types.includes('holiday')) return 'color-holiday';
            if (types.includes('assignment') || types.includes('event')) return 'color-event';
            if (types.includes('other')) return 'color-other';
            return 'color-default';
        }

        function getEventTypeIcon(type) {
            const map = { exam: 'fa-pencil-alt', holiday: 'fa-umbrella-beach', assignment: 'fa-file-alt', event: 'fa-calendar-check',
                other: 'fa-circle' };
            return map[type] || 'fa-calendar-day';
        }

        function getEventTypeLabel(type) {
            const map = { exam: 'Exam', holiday: 'Holiday', assignment: 'Assignment', event: 'Event', other: 'Other' };
            return map[type] || 'Event';
        }

        // ════════════════════════════════════════════════════════════════
        //  FETCH EVENTS
        // ════════════════════════════════════════════════════════════════
        async function loadEvents() {
            statusLabel.textContent = '⏳ Loading…';
            statusLabel.style.color = '#3b82f6';

            try {
                if (SCRIPT_URL === 'YOUR_DEPLOYED_SCRIPT_URL_HERE') {
                    throw new Error('Set your SCRIPT_URL first!');
                }

                const resp = await fetch(`${SCRIPT_URL}?action=getEvents&t=${Date.now()}`);
                const data = await resp.json();

                if (data.result === 'success' && data.length > 0) {
                    eventsData = data;
                    statusLabel.textContent = `✅ ${eventsData.length} events loaded`;
                    statusLabel.style.color = '#10b981';
                    showToast(`✅ Loaded ${eventsData.length} events`, 'success');
                } else if (data.result === 'success' && data.length === 0) {
                    eventsData = FALLBACK_EVENTS;
                    statusLabel.textContent = '📋 No events in sheet (using fallback)';
                    statusLabel.style.color = '#f59e0b';
                    showToast('📋 Sheet is empty – using fallback', 'info');
                } else {
                    throw new Error(data.message || 'Unknown error');
                }
            } catch (err) {
                console.error('Error:', err);
                eventsData = FALLBACK_EVENTS;
                statusLabel.textContent = '⚠️ ' + err.message;
                statusLabel.style.color = '#ef4444';
                showToast('⚠️ ' + err.message + ' – using fallback', 'error');
            }

            renderCalendar(currentYear, currentMonth);
            const today = new Date();
            onDayClick(today.getFullYear(), today.getMonth(), today.getDate());
        }

        // ════════════════════════════════════════════════════════════════
        //  RENDER CALENDAR
        // ════════════════════════════════════════════════════════════════
        function renderCalendar(year, month) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const today = new Date();
            const todayY = today.getFullYear(),
                todayM = today.getMonth(),
                todayD = today.getDate();

            let html = '';
            dayNames.forEach(name => { html += `<div class="day-name">${name}</div>`; });

            const prevMonth = month === 0 ? 11 : month - 1;
            const prevYear = month === 0 ? year - 1 : year;
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += renderDayCell(prevYear, prevMonth, day, true, todayY, todayM, todayD);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                html += renderDayCell(year, month, day, false, todayY, todayM, todayD);
            }

            const totalCells = firstDay + daysInMonth;
            const remaining = (7 - (totalCells % 7)) % 7;
            const nextMonth = month === 11 ? 0 : month + 1;
            const nextYear = month === 11 ? year + 1 : year;
            for (let day = 1; day <= remaining; day++) {
                html += renderDayCell(nextYear, nextMonth, day, true, todayY, todayM, todayD);
            }

            gridEl.innerHTML = html;
            monthLabel.textContent = `${monthNames[month]} ${year}`;
        }

        function renderDayCell(year, month, day, isOtherMonth, todayY, todayM, todayD) {
            const dateKey = formatDateKey(year, month, day);
            const events = getEventsForDate(year, month, day);
            const isToday = (year === todayY && month === todayM && day === todayD);
            const isSelected = selectedDate && selectedDate.getFullYear() === year &&
                selectedDate.getMonth() === month && selectedDate.getDate() === day;

            let classes = 'day-cell';
            if (isOtherMonth) classes += ' other-month';
            if (isToday) classes += ' today';
            if (isSelected) classes += ' selected';
            if (events.length > 0) classes += ' has-event';

            const colorClass = getDayColorClass(events);
            let dotsHtml = '';
            const uniqueTypes = [...new Set(events.map(e => e.type))];
            uniqueTypes.forEach(type => { dotsHtml += `<span class="event-dot ${type}"></span>`; });
            let badgeHtml = events.length > 1 ? `<span class="event-count-badge">${events.length}</span>` : '';

            return `
                <div class="${classes}" data-date="${dateKey}" onclick="onDayClick(${year}, ${month}, ${day})">
                    <span class="day-number ${colorClass}">${day}</span>
                    ${dotsHtml ? `<div class="event-dots">${dotsHtml}</div>` : ''}
                    ${badgeHtml}
                </div>
            `;
        }

        // ════════════════════════════════════════════════════════════════
        //  DAY CLICK
        // ════════════════════════════════════════════════════════════════
        window.onDayClick = function(year, month, day) {
            const dateObj = new Date(year, month, day);
            selectedDate = dateObj;
            document.querySelectorAll('.day-cell').forEach(el => el.classList.remove('selected'));
            const target = document.querySelector(`.day-cell[data-date="${formatDateKey(year, month, day)}"]`);
            if (target) target.classList.add('selected');
            showEventDetails(dateObj);
        };

        function showEventDetails(dateObj) {
            const events = getEventsForDate(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
            const year = dateObj.getFullYear(),
                month = dateObj.getMonth(),
                day = dateObj.getDate();
            panelDateLabel.textContent = `${monthNames[month]} ${day}, ${year}`;

            if (events.length === 0) {
                panelEventList.innerHTML =
                    `<div class="no-events-msg"><i class="fas fa-calendar-minus me-2"></i>No events on this day.</div>`;
            } else {
                let html = '';
                events.forEach(ev => {
                    const iconClass = ev.type || 'event';
                    const icon = getEventTypeIcon(iconClass);
                    const label = getEventTypeLabel(iconClass);
                    html += `
                        <div class="event-item">
                            <div class="event-icon ${iconClass}"><i class="fas ${icon}"></i></div>
                            <div class="event-info">
                                <div class="event-title">${ev.title}</div>
                                <div class="event-meta">
                                    ${ev.description ? `<span>${ev.description}</span>` : ''}
                                    <span class="event-badge ${iconClass}">${label}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                panelEventList.innerHTML = html;
            }
            panel.classList.add('visible');
        }

        // ════════════════════════════════════════════════════════════════
        //  NAVIGATION
        // ════════════════════════════════════════════════════════════════
        function navigateMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) { currentMonth = 11;
                currentYear--; } else if (currentMonth > 11) { currentMonth = 0;
                currentYear++; }
            renderCalendar(currentYear, currentMonth);
            if (selectedDate) {
                const selY = selectedDate.getFullYear(),
                    selM = selectedDate.getMonth();
                if (!(selY === currentYear && selM === currentMonth)) {
                    panel.classList.remove('visible');
                    document.querySelectorAll('.day-cell').forEach(el => el.classList.remove('selected'));
                    selectedDate = null;
                } else {
                    onDayClick(selY, selM, selectedDate.getDate());
                }
            }
        }

        // ════════════════════════════════════════════════════════════════
        //  EVENT LISTENERS
        // ════════════════════════════════════════════════════════════════
        prevBtn.addEventListener('click', () => navigateMonth(-1));
        nextBtn.addEventListener('click', () => navigateMonth(1));
        todayBtn.addEventListener('click', () => {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderCalendar(currentYear, currentMonth);
            onDayClick(currentYear, currentMonth, today.getDate());
        });
        refreshBtn.addEventListener('click', () => {
            const icon = refreshBtn.querySelector('i');
            icon.classList.add('fa-spin');
            loadEvents().finally(() => setTimeout(() => icon.classList.remove('fa-spin'), 600));
        });
        panelCloseBtn.addEventListener('click', () => {
            panel.classList.remove('visible');
            document.querySelectorAll('.day-cell').forEach(el => el.classList.remove('selected'));
            selectedDate = null;
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') navigateMonth(-1);
            else if (e.key === 'ArrowRight') navigateMonth(1);
            else if (e.key === 'Escape') {
                panel.classList.remove('visible');
                document.querySelectorAll('.day-cell').forEach(el => el.classList.remove('selected'));
                selectedDate = null;
            }
        });

        // ════════════════════════════════════════════════════════════════
        //  INIT
        // ════════════════════════════════════════════════════════════════
        if (SCRIPT_URL === 'YOUR_DEPLOYED_SCRIPT_URL_HERE') {
            statusLabel.textContent = '⚠️ Set SCRIPT_URL';
            statusLabel.style.color = '#ef4444';
            eventsData = FALLBACK_EVENTS;
            renderCalendar(currentYear, currentMonth);
            const today = new Date();
            onDayClick(today.getFullYear(), today.getMonth(), today.getDate());
            showToast('⚠️ Set SCRIPT_URL in the code', 'error');
        } else {
            loadEvents();
        }
    </script>

</body>
</html>
