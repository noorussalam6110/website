<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Debug - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Anek Malayalam', sans-serif;
            background: #0a0a1a;
            padding: 15px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .card h3 {
            color: #e94560;
            margin-bottom: 10px;
        }
        .debug-box {
            background: #1a1a2e;
            color: #ffd700;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-bottom: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #ffc107; }
        
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            margin: 5px;
            cursor: pointer;
        }
        input {
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #ddd;
            width: 100%;
            margin: 5px 0;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 10px;
        }
        .status-online { background: #28a745; color: white; }
        .status-offline { background: #dc3545; color: white; }
        .status-syncing { background: #ffc107; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h3>🔧 Debug Panel - Admin Connection Test</h3>
            <div class="debug-box" id="debugLog">
                <div>⏳ Initializing...</div>
            </div>
            
            <div style="margin-top: 15px;">
                <label style="font-weight: bold;">🔗 Google Apps Script URL:</label>
                <input type="text" id="gasUrlInput" placeholder="Paste your GAS URL here" style="margin-top: 5px;">
                <button onclick="saveAndTest()">💾 Save & Test Connection</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📊 Quick Test</h3>
            <button onclick="testGetAll()">📡 Test GET_ALL</button>
            <button onclick="testAddToken()">➕ Test Add Token</button>
            <button onclick="testCallNext()">⏩ Test Call Next (Counter 1)</button>
            <button onclick="clearLog()">🗑️ Clear Log</button>
        </div>
        
        <div class="card">
            <h3>📋 Current Data</h3>
            <div id="dataDisplay" style="font-size: 0.8rem; background: #f8f9fa; padding: 10px; border-radius: 12px;">
                No data loaded yet
            </div>
        </div>
    </div>

    <script>
        let GAS_URL = localStorage.getItem('gas_url') || '';
        let debugLog = [];
        
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logDiv = document.getElementById('debugLog');
            const colorClass = type === 'success' ? 'success' : (type === 'error' ? 'error' : 'info');
            logDiv.innerHTML += `<div class="${colorClass}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            document.getElementById('debugLog').innerHTML = '<div>Log cleared</div>';
        }
        
        function saveAndTest() {
            const url = document.getElementById('gasUrlInput').value.trim();
            if (url) {
                GAS_URL = url;
                localStorage.setItem('gas_url', url);
                addLog(`✅ URL saved: ${url}`, 'success');
                testConnection();
            } else {
                addLog('❌ Please enter a valid URL', 'error');
            }
        }
        
        async function testConnection() {
            if (!GAS_URL) {
                addLog('❌ No URL configured! Please enter your GAS URL', 'error');
                return;
            }
            
            addLog(`🔍 Testing connection to: ${GAS_URL}`, 'info');
            
            try {
                const response = await fetch(GAS_URL + '?action=get_all');
                addLog(`Response status: ${response.status}`, response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    const result = await response.json();
                    addLog(`Response: ${JSON.stringify(result).substring(0, 200)}`, 'success');
                    if (result.success) {
                        addLog('✅ Connection successful!', 'success');
                        displayData(result.data);
                    } else {
                        addLog(`❌ API returned error: ${result.data}`, 'error');
                    }
                } else {
                    addLog(`❌ HTTP Error: ${response.status}`, 'error');
                }
            } catch (error) {
                addLog(`❌ Connection failed: ${error.message}`, 'error');
                addLog('💡 Check: URL是否正确? CORS? Network?', 'info');
            }
        }
        
        async function testGetAll() {
            if (!GAS_URL) {
                addLog('❌ No URL configured!', 'error');
                return;
            }
            
            addLog('📡 Fetching all data...', 'info');
            try {
                const response = await fetch(GAS_URL + '?action=get_all');
                const result = await response.json();
                
                if (result.success) {
                    addLog(`✅ Data received: ${JSON.stringify(result.data).substring(0, 300)}`, 'success');
                    displayData(result.data);
                } else {
                    addLog(`❌ Error: ${result.data}`, 'error');
                }
            } catch (error) {
                addLog(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function testAddToken() {
            if (!GAS_URL) {
                addLog('❌ No URL configured!', 'error');
                return;
            }
            
            addLog('➕ Testing add token...', 'info');
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'add_token',
                        token_number: '99',
                        counter: 1
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    addLog(`✅ Token added: ${JSON.stringify(result.data)}`, 'success');
                    testGetAll();
                } else {
                    addLog(`❌ Add failed: ${result.data}`, 'error');
                }
            } catch (error) {
                addLog(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        async function testCallNext() {
            if (!GAS_URL) {
                addLog('❌ No URL configured!', 'error');
                return;
            }
            
            addLog('⏩ Testing call next...', 'info');
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'call_next',
                        counter_id: 1
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    addLog(`✅ Call next success: ${JSON.stringify(result.data)}`, 'success');
                    testGetAll();
                } else {
                    addLog(`❌ Call next failed: ${result.data}`, 'error');
                }
            } catch (error) {
                addLog(`❌ Error: ${error.message}`, 'error');
            }
        }
        
        function displayData(data) {
            const container = document.getElementById('dataDisplay');
            if (data) {
                container.innerHTML = `
                    <div><strong>Counters:</strong> ${data.counters ? data.counters.length : 0}</div>
                    <div><strong>Active Counters:</strong> ${data.counters ? data.counters.filter(c => c.currentToken).length : 0}</div>
                    <div><strong>Total Waiting:</strong> ${data.counters ? data.counters.reduce((s, c) => s + (c.queue ? c.queue.length : 0), 0) : 0}</div>
                    <div><strong>Config:</strong> ${JSON.stringify(data.config || {})}</div>
                    <details>
                        <summary>Full Data</summary>
                        <pre style="font-size: 0.7rem; overflow-x: auto;">${JSON.stringify(data, null, 2)}</pre>
                    </details>
                `;
            } else {
                container.innerHTML = 'No data';
            }
        }
        
        // Load saved URL on startup
        if (GAS_URL) {
            document.getElementById('gasUrlInput').value = GAS_URL;
            addLog(`Loaded saved URL: ${GAS_URL}`, 'info');
            testConnection();
        } else {
            addLog('💡 Please enter your Google Apps Script URL above', 'info');
        }
    </script>
</body>
</html>
