<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noorussalam - Fee Check (GitHub)</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* --- Basic Styles (Simplified for space) --- */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Anek Malayalam', sans-serif;
            background: #0b1120; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px;
        }
        .container {
            max-width:580px; width:100%; background:rgba(255,255,255,0.05); backdrop-filter:blur(24px);
            border-radius:56px; padding:30px 24px; box-shadow:0 30px 80px rgba(0,0,0,0.5);
            border:1px solid rgba(255,255,255,0.06);
        }
        .header { text-align:center; color:white; margin-bottom:24px; }
        .header h1 { font-size:1.7rem; font-weight:800; color:#fbbf24; }
        .header p { opacity:0.6; }
        .input-group { margin-bottom:16px; }
        .input-label { color:rgba(255,255,255,0.7); font-weight:600; font-size:0.8rem; margin-bottom:6px; }
        .ring-wrapper input {
            width:100%; padding:16px 20px; border:none; border-radius:60px; background:rgba(11,17,32,0.92);
            color:#e8edf4; font-size:1.1rem; text-align:center; outline:2px solid #6366f1; font-family:monospace;
        }
        .check-btn {
            width:100%; padding:16px; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:white;
            border:none; border-radius:60px; font-weight:700; font-size:1rem; cursor:pointer; margin-top:12px;
            transition:0.3s; box-shadow:0 4px 25px rgba(99,102,241,0.3);
        }
        .check-btn:hover { transform:translateY(-2px); }
        .check-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .result-card { margin-top:20px; background:rgba(255,255,255,0.04); border-radius:28px; overflow:hidden; border:1px solid rgba(255,255,255,0.06); }
        .info-table { width:100%; border-collapse:collapse; }
        .info-table td { padding:12px 16px; color:rgba(255,255,255,0.8); border-bottom:1px solid rgba(255,255,255,0.04); }
        .info-table td:first-child { color:rgba(255,255,255,0.4); font-weight:600; }
        .amount-pending { color:#fbbf24; font-weight:700; }
        .amount-cleared { color:#34d399; }
        .whatsapp-btn { background:#059669; color:white; padding:12px; border-radius:60px; text-align:center; margin:16px; display:block; text-decoration:none; font-weight:700; }
        .gpay-btn { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); padding:14px; border-radius:60px; color:white; font-weight:700; width:100%; cursor:pointer; margin-top:10px; }
        .footer { text-align:center; padding:16px; color:rgba(255,255,255,0.2); font-size:0.65rem; margin-top:16px; border-top:1px solid rgba(255,255,255,0.03); }
        .footer a { color:rgba(255,255,255,0.4); cursor:pointer; text-decoration:none; }
        .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:#0f172a; color:white; padding:12px 28px; border-radius:60px; transition:0.4s; z-index:999; }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .loader { display:none; text-align:center; padding:20px; color:white; }
        .spinner { width:40px; height:40px; border:4px solid rgba(255,255,255,0.1); border-top:4px solid #818cf8; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 10px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        /* Admin Overlay (Minimal) */
        .admin-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:1000; display:none; align-items:center; justify-content:center; }
        .admin-overlay.active { display:flex; }
        .admin-modal { background:#1e293b; color:white; border-radius:40px; max-width:600px; width:90%; max-height:90vh; overflow-y:auto; padding:32px; }
        .admin-modal .close { float:right; background:none; border:none; color:#94a3b8; font-size:1.5rem; cursor:pointer; }
        .admin-title { font-size:1.2rem; font-weight:700; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
        .admin-tabs { display:flex; gap:4px; background:#0f172a; border-radius:16px; padding:4px; margin-bottom:20px; }
        .admin-tabs .tab { padding:8px 16px; border-radius:14px; border:none; background:transparent; color:#94a3b8; font-weight:600; cursor:pointer; }
        .admin-tabs .tab.active { background:#6366f1; color:white; }
        .admin-stats { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
        .admin-stat-card { background:#0f172a; padding:12px; border-radius:16px; text-align:center; }
        .admin-stat-card .num { font-size:1.4rem; font-weight:800; }
        .admin-stat-card .label { font-size:0.5rem; opacity:0.6; }
        .admin-table-wrap { background:#0f172a; border-radius:16px; overflow-x:auto; padding:10px; }
        .admin-table-wrap table { width:100%; border-collapse:collapse; font-size:0.7rem; }
        .admin-table-wrap th { text-align:left; color:#94a3b8; padding:8px; }
        .admin-table-wrap td { padding:8px; border-bottom:1px solid #1e293b; }
        .btn-sm { padding:2px 8px; border-radius:20px; border:none; font-weight:600; cursor:pointer; margin:2px; }
        .btn-sm.edit { background:#e0e7ff; color:#4f46e5; }
        .btn-sm.del { background:#fee2e2; color:#dc2626; }
        .btn-sm.pay { background:#dcfce7; color:#16a34a; }
        .btn-sm.history { background:#fef3c7; color:#d97706; }
        .btn-admin { padding:8px 16px; border-radius:40px; border:none; font-weight:600; cursor:pointer; background:#6366f1; color:white; }
        .admin-form input { width:100%; padding:10px; border-radius:40px; border:1px solid #334155; background:#0f172a; color:white; margin-bottom:10px; }
        .status-badge { padding:2px 10px; border-radius:30px; font-size:0.6rem; }
        .status-badge.pending { background:#dc2626; color:white; }
        .status-badge.paid { background:#16a34a; color:white; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .admin-tab-content { display:none; }
        .admin-tab-content.active { display:block; }
        .admin-login-error { color:#ef4444; margin-top:10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>നൂറുസ്സലാം മദ്റസ</h1>
        <p>കമ്പിപ്പാലം - വരിസംഖ്യ പരിശോധന</p>
    </div>

    <div class="input-group">
        <div class="input-label"><i class="fas fa-mobile-alt"></i> രജിസ്റ്റർ ചെയ്ത മൊബൈൽ നമ്പർ</div>
        <div class="ring-wrapper">
            <input type="tel" id="mobile" placeholder="9876543210" maxlength="10" />
        </div>
    </div>
    <button class="check-btn" onclick="checkFee()"><i class="fas fa-search"></i> പരിശോധിക്കുക</button>

    <div id="loader" class="loader"><div class="spinner"></div><span>ദയവായി കാത്തിരിക്കുക...</span></div>
    <div id="result"></div>

    <div class="footer">
        <a onclick="openAdmin()">🔐 Admin</a> | Noorussalam © 2026
    </div>
</div>

<div id="toastMsg" class="toast"></div>

<!-- ===== ADMIN OVERLAY ===== -->
<div class="admin-overlay" id="adminOverlay">
    <div class="admin-modal">
        <button class="close" onclick="closeAdmin()">&times;</button>
        <div id="adminLoginSection">
            <div class="admin-title">🔒 Admin Login</div>
            <input type="password" id="adminPassword" placeholder="Enter Password" style="width:100%;padding:12px;border-radius:40px;border:1px solid #334155;background:#0f172a;color:white;" />
            <button class="btn-admin" style="width:100%;margin-top:10px;" onclick="adminLogin()">Login</button>
            <div class="admin-login-error" id="adminLoginError"></div>
        </div>
        <div id="adminPanelSection" style="display:none;">
            <div class="admin-title"><span><i class="fas fa-user-cog"></i> Admin Panel</span> <button onclick="adminLogout()" style="background:#dc2626;border:none;color:white;padding:6px 16px;border-radius:40px;cursor:pointer;">Logout</button></div>
            <div class="admin-tabs">
                <button class="tab active" data-tab="tabDashboard" onclick="switchTab('tabDashboard')">Dashboard</button>
                <button class="tab" data-tab="tabStudents" onclick="switchTab('tabStudents')">Students</button>
                <button class="tab" data-tab="tabFees" onclick="switchTab('tabFees')">Fees</button>
                <button class="tab" data-tab="tabSettings" onclick="switchTab('tabSettings')">Settings</button>
            </div>

            <div id="tabDashboard" class="admin-tab-content active">
                <div class="admin-stats">
                    <div class="admin-stat-card"><div class="num" id="statTotal">0</div><div class="label">Total</div></div>
                    <div class="admin-stat-card"><div class="num" id="statPending" style="color:#ef4444;">0</div><div class="label">Pending</div></div>
                    <div class="admin-stat-card"><div class="num" id="statPaid" style="color:#10b981;">0</div><div class="label">Paid</div></div>
                    <div class="admin-stat-card"><div class="num" id="statAmount" style="color:#f59e0b;">₹0</div><div class="label">Due</div></div>
                </div>
            </div>

            <div id="tabStudents" class="admin-tab-content">
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
                    <input type="text" id="adminSearch" placeholder="Search..." oninput="renderStudents()" style="flex:1;padding:8px 16px;border-radius:40px;border:1px solid #334155;background:#0f172a;color:white;" />
                    <select id="adminFilter" onchange="renderStudents()" style="padding:8px 16px;border-radius:40px;background:#0f172a;color:white;border:1px solid #334155;">
                        <option value="all">All</option><option value="pending">Pending</option><option value="paid">Paid</option>
                    </select>
                    <button class="btn-admin" onclick="openAddStudent()"><i class="fas fa-plus"></i> Add</button>
                </div>
                <div class="admin-table-wrap" id="adminStudentsTableWrap"><div class="admin-loader">Loading...</div></div>
            </div>

            <div id="tabFees" class="admin-tab-content">
                <div style="display:flex;gap:10px;margin-bottom:10px;">
                    <input type="text" id="adminFeeSearch" placeholder="Search..." oninput="renderFees()" style="flex:1;padding:8px 16px;border-radius:40px;border:1px solid #334155;background:#0f172a;color:white;" />
                    <button class="btn-admin" onclick="openBulk()"><i class="fas fa-edit"></i> Bulk</button>
                </div>
                <div class="admin-table-wrap" id="adminFeesTableWrap"><div class="admin-loader">Loading...</div></div>
            </div>

            <div id="tabSettings" class="admin-tab-content">
                <form onsubmit="saveSettings(event)">
                    <div class="form-row">
                        <div><label>Monthly Fee</label><input type="number" id="setMonthlyFee" /></div>
                        <div><label>UPI ID</label><input type="text" id="setUpiId" /></div>
                    </div>
                    <div><label>Payee Name</label><input type="text" id="setPayeeName" /></div>
                    <button type="submit" class="btn-admin" style="width:100%;">Save Settings</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ===== ADD/EDIT FORM ===== -->
<div class="admin-overlay" id="studentFormOverlay">
    <div class="admin-modal" style="max-width:500px;">
        <button class="close" onclick="document.getElementById('studentFormOverlay').classList.remove('active')">&times;</button>
        <div class="admin-title" id="studentFormTitle">Add Student</div>
        <form onsubmit="saveStudent(event)">
            <input type="hidden" id="editMobile" />
            <input type="text" id="fParentName" placeholder="Parent Name *" required />
            <input type="text" id="fStudentName" placeholder="Student Name" />
            <input type="text" id="fMobile" placeholder="Mobile (10 digits)" maxlength="10" required />
            <div class="form-row">
                <input type="month" id="fLastPaidMonth" placeholder="Last Paid Month" />
                <input type="number" id="fPaidMonths" placeholder="Paid Months" value="0" />
            </div>
            <input type="number" id="fPrevBalance" placeholder="Previous Balance" value="0" />
            <input type="date" id="fLastPaidDate" />
            <div style="display:flex;gap:10px;margin-top:10px;">
                <button type="button" class="btn-admin" style="background:#475569;" onclick="document.getElementById('studentFormOverlay').classList.remove('active')">Cancel</button>
                <button type="submit" class="btn-admin" id="studentSubmitBtn" style="flex:1;">Save</button>
            </div>
        </form>
    </div>
</div>

<!-- ===== BULK FORM ===== -->
<div class="admin-overlay" id="bulkOverlay">
    <div class="admin-modal" style="max-width:480px;">
        <button class="close" onclick="document.getElementById('bulkOverlay').classList.remove('active')">&times;</button>
        <div class="admin-title">Bulk Update</div>
        <form onsubmit="applyBulk(event)">
            <input type="month" id="bulkMonth" required placeholder="Month" />
            <input type="number" id="bulkPaidMonths" placeholder="Paid Months (optional)" />
            <div style="display:flex;gap:10px;margin-top:10px;">
                <button type="button" class="btn-admin" style="background:#475569;" onclick="document.getElementById('bulkOverlay').classList.remove('active')">Cancel</button>
                <button type="submit" class="btn-admin" style="flex:1;">Update All</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURATION - CHANGE THIS TO YOUR GAS URL
    // ============================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbwhPQtwWoUQ-jE4YpfWvibVoAGkeQO5AhA1zJ4Rz6lt1bWrnMiGNngDOb6qyyi7WcW3/exec"; // <-- CHANGE THIS
    const MONTHLY_FEE = 200;
    const UPI_ID = "ameerpattani786@oksbi";
    const PAYEE_NAME = "Noorussalam Madrasa";

    let allRecords = [];
    let isAdmin = false;

    // ============================================================
    // TOAST
    // ============================================================
    function showToast(msg, isErr = false) {
        const t = document.getElementById("toastMsg");
        t.textContent = msg;
        t.style.background = isErr ? "#dc2626" : "#0f172a";
        t.classList.add("show");
        clearTimeout(t._hideTimer);
        t._hideTimer = setTimeout(() => t.classList.remove("show"), 2500);
    }

    // ============================================================
    // JSONP REQUEST (For Public Check - GET)
    // ============================================================
    function jsonpRequest(params) {
        return new Promise((resolve, reject) => {
            const cb = "cb_" + Date.now();
            window[cb] = (data) => { delete window[cb];
                resolve(data); };
            const script = document.createElement('script');
            script.src = API_URL + '?' + params + '&callback=' + cb;
            script.onerror = () => { delete window[cb];
                reject(new Error('Network error')); };
            document.head.appendChild(script);
            setTimeout(() => { if (window[cb]) { delete window[cb];
                    reject(new Error('Timeout')); } }, 10000);
        });
    }

    // ============================================================
    // FETCH REQUEST (For Admin - POST)
    // ============================================================
    async function adminFetch(action, payload = {}) {
        try {
            const resp = await fetch(API_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...payload })
            });
            return await resp.json();
        } catch (e) {
            return { success: false, message: "Network Error: " + e.message };
        }
    }

    // ============================================================
    // PUBLIC FEE CHECK
    // ============================================================
    async function checkFee() {
        const mobile = document.getElementById('mobile').value.trim();
        if (mobile.length !== 10) { showToast("Enter 10-digit mobile", true); return; }
        const btn = document.querySelector('.check-btn');
        btn.disabled = true;
        document.getElementById('loader').style.display = 'block';
        document.getElementById('result').innerHTML = '';

        try {
            const data = await jsonpRequest('mobile=' + mobile);
            btn.disabled = false;
            document.getElementById('loader').style.display = 'none';
            if (data && data.success) {
                displayResult(data);
            } else {
                showToast(data?.message || "Not found", true);
            }
        } catch (e) {
            btn.disabled = false;
            document.getElementById('loader').style.display = 'none';
            showToast("❌ " + e.message, true);
        }
    }

    function displayResult(data) {
        const pending = data.totalPending || 0;
        let html = `
            <div class="result-card">
                <table class="info-table">
                    <tr><td>Parent</td><td><strong>${data.parentName}</strong></td></tr>
                    ${data.studentName ? `<tr><td>Student</td><td>${data.studentName}</td></tr>` : ''}
                    <tr><td>Last Paid</td><td>${data.lastPaidMonth || '---'}</td></tr>
                    <tr><td>Pending Months</td><td>${data.pendingMonths || 0}</td></tr>
                    <tr><td>Total Due</td><td class="${pending > 0 ? 'amount-pending' : 'amount-cleared'}">₹${pending.toLocaleString()}</td></tr>
                </table>
                <a href="https://wa.me/91${data.mobile}?text=${encodeURIComponent('Fee details...')}" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                <button class="gpay-btn" onclick="initiateGPay(${pending}, '${data.parentName}', '${data.mobile}')"><i class="fab fa-google-pay"></i> Pay with GPay</button>
            </div>`;
        document.getElementById('result').innerHTML = html;
    }

    function initiateGPay(amount, name, mobile) {
        if (!amount || amount <= 0) { alert("No due amount."); return; }
        const link =
            `upi://pay?pa=${UPI_ID}&pn=${PAYEE_NAME}&am=${amount.toFixed(2)}&cu=INR&tn=Madrasa%20Fee`;
        window.open(link, '_blank');
    }

    // ============================================================
    // ADMIN LOGIN
    // ============================================================
    async function adminLogin() {
        const pass = document.getElementById('adminPassword').value;
        const err = document.getElementById('adminLoginError');
        if (!pass) { err.textContent = "Enter password"; return; }
        try {
            const res = await jsonpRequest('action=verifyAdmin&password=' + encodeURIComponent(pass));
            if (res === true || res === "true") {
                isAdmin = true;
                document.getElementById('adminLoginSection').style.display = 'none';
                document.getElementById('adminPanelSection').style.display = 'block';
                err.textContent = '';
                loadDashboard();
            } else {
                err.textContent = "Wrong password";
            }
        } catch (e) { err.textContent = "Error: " + e.message; }
    }

    function adminLogout() {
        if (confirm("Logout?")) {
            isAdmin = false;
            document.getElementById('adminLoginSection').style.display = 'block';
            document.getElementById('adminPanelSection').style.display = 'none';
            document.getElementById('adminPassword').value = '';
            closeAdmin();
            showToast("Logged out");
        }
    }

    function openAdmin() {
        document.getElementById('adminOverlay').classList.add('active');
        if (isAdmin) {
            document.getElementById('adminLoginSection').style.display = 'none';
            document.getElementById('adminPanelSection').style.display = 'block';
            loadDashboard();
        } else {
            document.getElementById('adminLoginSection').style.display = 'block';
            document.getElementById('adminPanelSection').style.display = 'none';
        }
    }

    function closeAdmin() {
        document.getElementById('adminOverlay').classList.remove('active');
    }

    // ============================================================
    // ADMIN DASHBOARD
    // ============================================================
    async function loadDashboard() {
        try {
            const data = await jsonpRequest('action=getDashboardData');
            if (data && !data.error) {
                allRecords = data.records || [];
                document.getElementById('statTotal').textContent = data.totalParents || 0;
                document.getElementById('statPending').textContent = data.parentsWithBalance || 0;
                document.getElementById('statPaid').textContent = data.parentsFullyPaid || 0;
                document.getElementById('statAmount').textContent = "₹" + (data.totalPendingAmount || 0).toLocaleString();
                // Load settings
                const settings = await jsonpRequest('action=getSettings');
                if (settings && !settings.error) {
                    document.getElementById('setMonthlyFee').value = settings.monthlyFee || 200;
                    document.getElementById('setUpiId').value = settings.upiId || '';
                    document.getElementById('setPayeeName').value = settings.payeeName || '';
                }
                renderStudents();
                renderFees();
            }
        } catch (e) { showToast("Dashboard error", true); }
    }

    function switchTab(id) {
        document.querySelectorAll('.admin-tabs .tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.admin-tabs .tab[data-tab="${id}"]`).classList.add('active');
        document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'tabStudents') renderStudents();
        if (id === 'tabFees') renderFees();
    }

    // ============================================================
    // RENDER STUDENTS
    // ============================================================
    function renderStudents() {
        const wrap = document.getElementById('adminStudentsTableWrap');
        const search = document.getElementById('adminSearch').value.toLowerCase();
        const filter = document.getElementById('adminFilter').value;
        let filtered = allRecords.filter(r => {
            const match = String(r.parentName).toLowerCase().includes(search) || String(r.mobile).includes(search);
            if (!match) return false;
            const pending = (r.pendingMonths || 0) * MONTHLY_FEE + (r.previousBalance || 0);
            if (filter === 'pending') return pending > 0;
            if (filter === 'paid') return pending === 0;
            return true;
        });
        if (!filtered.length) { wrap.innerHTML = '<div class="admin-empty">No records</div>'; return; }
        let html =
            `<table><tr><th>#</th><th>Parent</th><th>Mobile</th><th>Due</th><th>Status</th><th>Actions</th></tr>`;
        filtered.forEach((r, i) => {
            const pending = (r.pendingMonths || 0) * MONTHLY_FEE + (r.previousBalance || 0);
            const status = pending > 0 ? '<span class="status-badge pending">Pending</span>' :
                '<span class="status-badge paid">Paid</span>';
            html += `<tr>
                        <td>${i+1}</td>
                        <td>${r.parentName}</td>
                        <td>${r.mobile}</td>
                        <td>₹${pending.toLocaleString()}</td>
                        <td>${status}</td>
                        <td>
                            <button class="btn-sm pay" onclick="payFee('${r.mobile}')"><i class="fas fa-check"></i></button>
                            <button class="btn-sm history" onclick="viewHistory('${r.mobile}')"><i class="fas fa-clock"></i></button>
                            <button class="btn-sm edit" onclick="openEdit('${r.mobile}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-sm del" onclick="deleteParent('${r.mobile}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
        });
        wrap.innerHTML = html + '</table>';
    }

    function renderFees() {
        const wrap = document.getElementById('adminFeesTableWrap');
        const search = document.getElementById('adminFeeSearch').value.toLowerCase();
        let filtered = allRecords.filter(r => String(r.mobile).includes(search) || String(r.parentName).toLowerCase()
        .includes(search));
        if (!filtered.length) { wrap.innerHTML = '<div class="admin-empty">No records</div>'; return; }
        let html =
            `<table><tr><th>#</th><th>Parent</th><th>Mobile</th><th>Paid</th><th>Pending</th><th>Due</th></tr>`;
        filtered.forEach((r, i) => {
            const pending = (r.pendingMonths || 0) * MONTHLY_FEE + (r.previousBalance || 0);
            html += `<tr>
                        <td>${i+1}</td>
                        <td>${r.parentName}</td>
                        <td>${r.mobile}</td>
                        <td>${r.paidMonths || 0}</td>
                        <td>${r.pendingMonths || 0}</td>
                        <td>₹${pending.toLocaleString()}</td>
                    </tr>`;
        });
        wrap.innerHTML = html + '</table>';
    }

    // ============================================================
    // ADMIN CRUD
    // ============================================================
    function openAddStudent() {
        document.getElementById('studentFormTitle').textContent = 'Add Student';
        document.getElementById('studentSubmitBtn').textContent = 'Save';
        document.getElementById('editMobile').value = '';
        ['fParentName', 'fStudentName', 'fMobile', 'fLastPaidMonth', 'fLastPaidDate'].forEach(id => document.getElementById(
            id).value = '');
        document.getElementById('fPaidMonths').value = '0';
        document.getElementById('fPrevBalance').value = '0';
        document.getElementById('studentFormOverlay').classList.add('active');
    }

    function openEdit(mobile) {
        const r = allRecords.find(x => String(x.mobile) === String(mobile));
        if (!r) return;
        document.getElementById('studentFormTitle').textContent = 'Edit Student';
        document.getElementById('studentSubmitBtn').textContent = 'Update';
        document.getElementById('editMobile').value = mobile;
        document.getElementById('fParentName').value = r.parentName || '';
        document.getElementById('fStudentName').value = r.studentName || '';
        document.getElementById('fMobile').value = r.mobile || '';
        document.getElementById('fLastPaidMonth').value = r.lastPaidMonth || '';
        document.getElementById('fPaidMonths').value = r.paidMonths || 0;
        document.getElementById('fPrevBalance').value = r.previousBalance || 0;
        document.getElementById('fLastPaidDate').value = r.lastPaidDate || '';
        document.getElementById('studentFormOverlay').classList.add('active');
    }

    async function saveStudent(e) {
        e.preventDefault();
        const mobile = document.getElementById('fMobile').value.trim();
        const editMobile = document.getElementById('editMobile').value;
        if (mobile.length !== 10) { showToast("Invalid mobile", true); return; }
        const payload = {
            parentName: document.getElementById('fParentName').value.trim(),
            mobile: editMobile || mobile,
            studentName: document.getElementById('fStudentName').value.trim(),
            lastPaidMonth: document.getElementById('fLastPaidMonth').value,
            paidMonths: parseInt(document.getElementById('fPaidMonths').value) || 0,
            previousBalance: parseInt(document.getElementById('fPrevBalance').value) || 0,
            lastPaidDate: document.getElementById('fLastPaidDate').value
        };
        const action = editMobile ? 'updateParent' : 'addNewParent';
        const result = await adminFetch(action, payload);
        if (result && result.success) {
            showToast(result.message);
            document.getElementById('studentFormOverlay').classList.remove('active');
            loadDashboard();
        } else {
            showToast(result?.message || "Error", true);
        }
    }

    async function payFee(mobile) {
        const month = prompt("Month (YYYY-MM):", new Date().toISOString().slice(0, 7));
        if (!month) return;
        const amount = prompt("Amount:", MONTHLY_FEE);
        if (!amount) return;
        const result = await adminFetch('updateFeePayment', { mobile, month, amount: parseInt(amount) || MONTHLY_FEE });
        if (result && result.success) { showToast(result.message);
            loadDashboard(); } else showToast(result?.message || "Error", true);
    }

    async function viewHistory(mobile) {
        const result = await adminFetch('getPaymentHistory', { mobile });
        if (result && result.success) {
            let msg = result.history.map(h => `${h.month}: ₹${h.amount} (${h.date})`).join('\n') || 'No history';
            alert('History for ' + result.parentName + ':\n' + msg);
        } else showToast(result?.message || "Error", true);
    }

    async function deleteParent(mobile) {
        if (!confirm("Delete this record?")) return;
        const result = await adminFetch('deleteParent', { mobile });
        if (result && result.success) { showToast(result.message);
            loadDashboard(); } else showToast(result?.message || "Error", true);
    }

    function openBulk() {
        document.getElementById('bulkMonth').value = '';
        document.getElementById('bulkPaidMonths').value = '';
        document.getElementById('bulkOverlay').classList.add('active');
    }

    async function applyBulk(e) {
        e.preventDefault();
        const month = document.getElementById('bulkMonth').value;
        const paid = document.getElementById('bulkPaidMonths').value;
        if (!month) { showToast("Select month", true); return; }
        const payload = { lastPaidMonth: month };
        if (paid !== '') payload.paidMonths = parseInt(paid);
        const result = await adminFetch('bulkUpdate', payload);
        if (result && result.success) { showToast(result.message);
            document.getElementById('bulkOverlay').classList.remove('active');
            loadDashboard(); } else showToast(result?.message || "Error", true);
    }

    async function saveSettings(e) {
        e.preventDefault();
        const payload = {
            monthlyFee: parseInt(document.getElementById('setMonthlyFee').value) || 200,
            upiId: document.getElementById('setUpiId').value.trim(),
            payeeName: document.getElementById('setPayeeName').value.trim()
        };
        const result = await adminFetch('updateSettings', payload);
        if (result && result.success) showToast(result.message);
        else showToast(result?.message || "Error", true);
    }

    // Close overlays on background click
    document.querySelectorAll('.admin-overlay').forEach(el => {
        el.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
    });

    console.log("✅ GitHub Pages Frontend Ready. API_URL:", API_URL);
</script>
</body>
</html>
