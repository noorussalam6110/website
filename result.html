<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results Unavailable</title>

    <!-- ─── Google Font: Anek Malayalam ─── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0b0b;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ── main container ── */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 600px;
        }

        /* ── animated icon (unchanged) ── */
        .status-icon {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 240px;
            height: 240px;
            background: radial-gradient(circle at 50% 50%,
                    rgba(255, 60, 60, 0.12) 0%,
                    transparent 70%);
            border-radius: 50%;
            animation: breathe 3s ease-in-out infinite;
        }

        .badge-status {
            position: relative;
            padding: 22px 38px;
            border-radius: 60px;
            background: linear-gradient(145deg, #ff3b3b, #cc0000);
            box-shadow:
                0 0 35px rgba(255, 0, 0, 0.6),
                0 0 70px rgba(200, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.2;
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.5);
            transform-origin: center top;
            animation: swing 2.8s ease-in-out infinite, pulse-red 2.4s ease-in-out infinite;
            cursor: default;
            user-select: none;
        }

        .badge-status::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 62px;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.5) 0%,
                    transparent 40%,
                    transparent 60%,
                    rgba(255, 200, 200, 0.2) 100%);
            pointer-events: none;
            animation: shimmer-red 3.5s ease-in-out infinite;
        }

        .badge-status::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 12%;
            width: 28%;
            height: 28%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%,
                    rgba(255, 255, 255, 0.6) 0%,
                    transparent 80%);
            pointer-events: none;
            opacity: 0.5;
            animation: sweep-red 4.5s ease-in-out infinite;
        }

        /* ── floating particles ── */
        .particle {
            position: absolute;
            font-size: 22px;
            font-weight: 700;
            color: #ff5e5e;
            text-shadow: 0 0 20px #ff2222, 0 0 40px #ff0000;
            pointer-events: none;
            opacity: 0;
            animation: particle-float var(--dur, 3s) ease-in-out infinite alternate;
        }

        .particle:nth-child(1) {
            top: 2%;
            left: 10%;
            --dur: 3.2s;
            animation-delay: 0.0s;
            font-size: 26px;
        }
        .particle:nth-child(2) {
            top: 6%;
            right: 6%;
            --dur: 2.8s;
            animation-delay: 0.7s;
            font-size: 20px;
        }
        .particle:nth-child(3) {
            bottom: 10%;
            left: 4%;
            --dur: 3.6s;
            animation-delay: 1.4s;
            font-size: 24px;
        }
        .particle:nth-child(4) {
            bottom: 4%;
            right: 8%;
            --dur: 2.5s;
            animation-delay: 0.4s;
            font-size: 18px;
        }
        .particle:nth-child(5) {
            top: 48%;
            left: -6%;
            --dur: 3.0s;
            animation-delay: 1.1s;
            font-size: 16px;
        }
        .particle:nth-child(6) {
            top: 44%;
            right: -6%;
            --dur: 3.8s;
            animation-delay: 1.8s;
            font-size: 20px;
        }

        /* ── keyframes ── */
        @keyframes pulse-red {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
                box-shadow: 0 0 35px rgba(255, 0, 0, 0.6), 0 0 70px rgba(200, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            }
            50% {
                transform: scale(1.05) rotate(0.5deg);
                box-shadow: 0 0 55px rgba(255, 50, 50, 0.8), 0 0 100px rgba(220, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            }
        }

        @keyframes swing {
            0%,
            100% {
                transform: rotate(-2deg) translateY(0);
            }
            50% {
                transform: rotate(2deg) translateY(-8px);
            }
        }

        @keyframes breathe {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.85;
            }
            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        @keyframes shimmer-red {
            0% {
                opacity: 0.3;
                transform: rotate(-4deg) scale(1);
            }
            50% {
                opacity: 0.9;
                transform: rotate(6deg) scale(1.02);
            }
            100% {
                opacity: 0.3;
                transform: rotate(-4deg) scale(1);
            }
        }

        @keyframes sweep-red {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(12px, -10px) scale(1.8);
                opacity: 0.9;
            }
        }

        @keyframes particle-float {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.3) rotate(0deg);
            }
            30% {
                opacity: 1;
                transform: translate(var(--tx, 25px), var(--ty, -35px)) scale(1.2) rotate(20deg);
            }
            70% {
                opacity: 1;
                transform: translate(var(--tx2, -15px), var(--ty2, 25px)) scale(0.8) rotate(-15deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx3, 45px), var(--ty3, -45px)) scale(0.2) rotate(40deg);
            }
        }

        .particle:nth-child(1) {
            --tx: 35px;
            --ty: -45px;
            --tx2: -20px;
            --ty2: 30px;
            --tx3: 55px;
            --ty3: -60px;
        }
        .particle:nth-child(2) {
            --tx: -40px;
            --ty: -30px;
            --tx2: 25px;
            --ty2: 35px;
            --tx3: -55px;
            --ty3: -50px;
        }
        .particle:nth-child(3) {
            --tx: 30px;
            --ty: 35px;
            --tx2: -35px;
            --ty2: -25px;
            --tx3: 50px;
            --ty3: 45px;
        }
        .particle:nth-child(4) {
            --tx: -30px;
            --ty: 40px;
            --tx2: 35px;
            --ty2: -30px;
            --tx3: -50px;
            --ty3: 55px;
        }
        .particle:nth-child(5) {
            --tx: 55px;
            --ty: -15px;
            --tx2: -20px;
            --ty2: 40px;
            --tx3: 65px;
            --ty3: -35px;
        }
        .particle:nth-child(6) {
            --tx: -50px;
            --ty: 15px;
            --tx2: 30px;
            --ty2: -40px;
            --tx3: -60px;
            --ty3: 25px;
        }

        /* ── thank you message ── */
        .thank-you-message {
            color: #e8e0e0;
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 1.5px;
            text-align: center;
            text-shadow: 0 0 40px rgba(255, 60, 60, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 20px;
            width: 100%;
            line-height: 1.5;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .thank-you-message span {
            display: inline-block;
            animation: fadeInUp 1s ease-out;
        }

        /* ─── DISTINCT BOX with YELLOW DOTTED BORDER ─── */
        .cta-box {
            width: 100%;
            background: rgba(255, 255, 0, 0.02);
            border: 2px dashed #ffcc00;
            border-radius: 28px;
            padding: 34px 24px 30px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 0, 0.02) inset;
            transition: all 0.4s ease;
            animation: fadeInUp 1.2s ease-out;
        }

        .cta-box:hover {
            border-color: #ffe066;
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(255, 204, 0, 0.04);
            background: rgba(255, 255, 0, 0.04);
        }

        .login-cta-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .login-cta-label {
            color: #f0e8e8;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-align: center;
            line-height: 1.5;
            text-shadow: 0 0 60px rgba(255, 200, 200, 0.05);
            font-family: 'Anek Malayalam', sans-serif;
        }

        .login-cta-label .accent {
            background: linear-gradient(135deg, #ff8a8a, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        /* ── Students Login button ── */
        .students-login-btn {
            display: inline-block;
            padding: 18px 48px;
            border-radius: 60px;
            background: linear-gradient(145deg, #ff4d4d, #cc0000);
            border: none;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            text-align: center;
            box-shadow:
                0 4px 35px rgba(255, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.06) inset;
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            width: 100%;
            max-width: 380px;
        }

        .students-login-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow:
                0 14px 55px rgba(255, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        .students-login-btn:active {
            transform: scale(0.96);
        }

        .students-login-btn .icon {
            display: inline-block;
            margin-right: 12px;
            font-size: 22px;
        }

        /* ── back-to-home button ── */
        .home-btn {
            display: inline-block;
            padding: 16px 52px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(4px);
            cursor: pointer;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #ffffff;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.08);
            transform: scale(1.04) translateY(-2px);
        }

        .home-btn:active {
            transform: scale(0.96);
        }

        /* ── button group ── */
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 100%;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── responsive ── */
        @media (max-width: 550px) {
            .status-icon {
                width: 180px;
                height: 180px;
            }
            .badge-status {
                padding: 14px 20px;
                font-size: 24px;
                letter-spacing: 1px;
            }
            .particle {
                font-size: 14px !important;
            }
            .thank-you-message {
                font-size: 18px;
                padding-top: 16px;
            }
            .cta-box {
                padding: 24px 16px 20px;
                border-radius: 20px;
                border-width: 2px;
            }
            .login-cta-label {
                font-size: 19px;
            }
            .students-login-btn {
                font-size: 17px;
                padding: 16px 24px;
                max-width: 100%;
            }
            .home-btn {
                padding: 14px 32px;
                font-size: 15px;
                letter-spacing: 1.5px;
                width: 100%;
                text-align: center;
            }
            .container {
                gap: 30px;
            }
            .button-group {
                gap: 14px;
            }
        }

        @media (max-width: 400px) {
            .cta-box {
                padding: 18px 12px 16px;
            }
            .login-cta-label {
                font-size: 16px;
            }
            .students-login-btn {
                font-size: 14px;
                padding: 14px 18px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- animated icon -->
        <div class="status-icon">
            <span class="particle">✕</span>
            <span class="particle">✕</span>
            <span class="particle">✕</span>
            <span class="particle">✕</span>
            <span class="particle">✕</span>
            <span class="particle">✕</span>

            <div class="badge-status">Results<br>Unavailable</div>
        </div>

        <!-- thank you message -->
        <div class="thank-you-message">
            <span>Thank you for visiting!<br />Please check back again later.</span>
        </div>

        <!-- ─── YELLOW DOTTED BOX ─── -->
        <div class="cta-box">
            <div class="login-cta-wrapper">
                <div class="login-cta-label">
                    <span class="accent">കുട്ടിയുടെ</span> നിലവിലെ<br />
                    മികവുകളെ പരിശോധിക്കുക
                </div>

                <a href="login.html" class="students-login-btn">
                    <span class="icon">✦</span> Students Login
                </a>
            </div>
        </div>

        <!-- back to home -->
        <div class="button-group">
            <a href="/" class="home-btn">← Back to Home</a>
        </div>

        <!--
          ℹ️ Replace href="/" with your actual homepage URL,
          and href="login.html" with your actual login page URL.
        -->
    </div>

</body>
</html>
