<script>
    const firebaseConfig = { apiKey: "AIzaSyD-0CCGYVtfTGQBnOEvub5M3sPaZDdsaUY", authDomain: "school-token-system-b75c7.firebaseapp.com", databaseURL: "https://school-token-system-b75c7-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "school-token-system-b75c7", storageBucket: "school-token-system-b75c7.firebasestorage.app", appId: "1:511726803989:web:c6b51bdb63d28e7433c21c" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    let counters = [];
    let config = { next_token_id: 1, last_called_token: null, tickerMessage: "✨ Welcome to Darunnajath UP School ✨" };
    let currentMode = 'admin';
    let maleEnglishVoice = null;
    let malayalamVoice = null;
    
    let speechQueue = [];
    let isSpeaking = false;
    let lastProcessedTs = 0;
    
    function playChime() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.12;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            oscillator.stop(audioCtx.currentTime + 0.5);
            audioCtx.resume();
        } catch(e) { console.warn("Chime error", e); }
    }
    
    function selectVoices() {
        const voices = window.speechSynthesis.getVoices();
        maleEnglishVoice = voices.find(v => v.name === "Google UK English Male") || voices.find(v => v.lang === 'en-US');
        malayalamVoice = voices.find(v => v.lang.includes('ml'));
    }
    
    function speakSmart(text) {
        if (!text) return;
        speechQueue.push(text);
        processSpeechQueue();
    }
    
    function processSpeechQueue() {
        if (isSpeaking || speechQueue.length === 0) return;
        isSpeaking = true;
        const text = speechQueue.shift();
        playChime();
        setTimeout(() => {
            const utterance = new SpeechSynthesisUtterance(text);
            if (/[\u0D00-\u0D7F]/.test(text)) {
                utterance.lang = 'ml-IN';
                if (malayalamVoice) utterance.voice = malayalamVoice;
            } else {
                utterance.lang = 'en-US';
                if (maleEnglishVoice) utterance.voice = maleEnglishVoice;
            }
            utterance.rate = 0.85;
            utterance.onend = () => { isSpeaking = false; processSpeechQueue(); };
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }, 180);
    }
    
    function setDisplayAnnouncement(text, isCustom = false) {
        const el = document.getElementById('malayalamAnnouncementText');
        if (el) {
            let displayText = text;
            if (!isCustom && text.includes('Token')) displayText = `🔔 ${text}`;
            el.textContent = displayText;
        }
        const box = document.getElementById('announcementBox');
        if (box) {
            box.classList.remove('announcement-pulse');
            void box.offsetWidth;
            box.classList.add('announcement-pulse');
            setTimeout(() => box.classList.remove('announcement-pulse'), 1000);
        }
    }
    
    function updateLastTokenUI(token) { document.getElementById('lastTokenDisplay').innerText = token || '---'; }
    function updateTickerMessage(msg) { document.getElementById('tickerText').innerText = msg; }
    
    async function sendCustomAnnouncement() {
        const input = document.getElementById('customAnnouncementInput');
        const txt = input.value.trim();
        if (!txt) { showToast("Please enter text"); return; }
        try {
            await db.ref('config').update({ custom_announcement: txt, last_announcement: txt, tickerMessage: txt, voice_ts: Date.now() });
            setDisplayAnnouncement(txt, true);
            speakSmart(txt);
            document.getElementById('announceFeedback').innerHTML = "✅ Sent!";
            setTimeout(() => document.getElementById('announceFeedback').innerHTML = "", 2000);
            input.value = "";
        } catch(e) { showToast("Error: " + e.message); }
    }
    
    async function resetAnnouncementToWelcome() {
        const welcomeMalayalam = "✨ ദാറുന്നജാത്ത് യു പി സ്കൂളിലേക്ക് സ്വാഗതം";
        const welcomeEng = "Welcome to Darunnajath UP School";
        await db.ref('config').update({ custom_announcement: null, last_announcement: welcomeEng, tickerMessage: welcomeEng, voice_ts: Date.now() });
        setDisplayAnnouncement(welcomeMalayalam, false);
        speakSmart(welcomeEng);
        showToast("Reset to welcome");
    }
    
    async function callNewToken(cid) {
        const snapCounters = await db.ref('counters').once('value');
        const snapConfig = await db.ref('config').once('value');
        let countersArr = snapCounters.val();
        let cfg = snapConfig.val();
        let nextToken = cfg.next_token_id || 1;
        let idx = countersArr.findIndex(c => c.id === cid);
        if (idx === -1 || countersArr[idx].isClosed) { showToast(`Counter ${cid} closed`); return; }
        if (countersArr[idx].currentToken !== null) countersArr[idx].servedCount = (countersArr[idx].servedCount || 0) + 1;
        countersArr[idx].currentToken = nextToken;
        const malayalamAnn = `ടോക്കൺ ${nextToken}, കൗണ്ടർ ${cid} ലേക്ക്`;
        const englishAnn = `Token ${nextToken} at Counter ${cid}, please come forward`;
        await db.ref('counters').set(countersArr);
        await db.ref('config').update({ 
            next_token_id: nextToken + 1, 
            last_called_token: nextToken, 
            last_announcement: englishAnn,
            custom_announcement: malayalamAnn,
            voice_ts: Date.now()
        });
        speakSmart(englishAnn);
        setDisplayAnnouncement(malayalamAnn, true);
        updateLastTokenUI(nextToken);
        triggerBlink(cid);
        triggerCallEnded(cid);
        showToast(`🔔 C${cid} → T${nextToken}`);
    }
    
    async function skipToken(cid) {
        let idx = counters.findIndex(c => c.id === cid);
        if (idx !== -1 && counters[idx].currentToken) {
            counters[idx].currentToken = null;
            await db.ref('counters').set(counters);
            showToast(`Token skipped for C${cid}`);
        } else showToast("No active token");
    }
    
    async function repeatToken(cid) {
        let idx = counters.findIndex(c => c.id === cid);
        if (idx !== -1 && counters[idx].currentToken) {
            let tokenNum = counters[idx].currentToken;
            let ann = `Token ${tokenNum} at Counter ${cid}, please come forward`;
            speakSmart(ann);
            triggerBlink(cid);
            showToast(`Repeating T${tokenNum}`);
        } else showToast("No token to repeat");
    }
    
    async function toggleCounterClose(cid) {
        let idx = counters.findIndex(c => c.id === cid);
        if (idx !== -1) {
            counters[idx].isClosed = !counters[idx].isClosed;
            await db.ref('counters').set(counters);
            showToast(counters[idx].isClosed ? `C${cid} closed` : `C${cid} opened`);
        }
    }
    
    async function toggleVisibility(cid) {
        let idx = counters.findIndex(c => c.id === cid);
        if (idx !== -1) {
            counters[idx].visible = !counters[idx].visible;
            await db.ref('counters').set(counters);
            showToast(`C${cid} is now ${counters[idx].visible ? 'Visible' : 'Hidden'}`);
        }
    }
    
    async function resetAll() {
        if (!confirm('⚠️ RESET ALL DATA?')) return;
        let fresh = [];
        for (let i = 1; i <= 14; i++) fresh.push({ id: i, currentToken: null, servedCount: 0, isClosed: false, visible: true });
        await db.ref('counters').set(fresh);
        await db.ref('config').update({ next_token_id: 1, last_called_token: null, last_announcement: 'System Reset', custom_announcement: null, voice_ts: Date.now() });
        showToast('System fully reset');
        setDisplayAnnouncement("System Reset - All counters ready", false);
        updateLastTokenUI(null);
    }
    
    function updateNextToken() {
        let val = parseInt(document.getElementById('nextTokenInput').value);
        if (val > 0) db.ref('config').update({ next_token_id: val }).then(() => showToast(`Next token set to ${val}`));
    }
    
    function updateTicker() {
        let val = document.getElementById('tickerInput').value;
        if (val) db.ref('config').update({ tickerMessage: val });
    }
    
    function triggerBlink(cid) { db.ref('blink_effect').set({ counterId: cid, ts: Date.now() }); setTimeout(() => db.ref('blink_effect').remove(), 2400); }
    function triggerCallEnded(cid) { db.ref('call_ended_effect').set({ counterId: cid, ts: Date.now() }); setTimeout(() => db.ref('call_ended_effect').remove(), 1600); }
    
    function renderAdminUI() {
        const listDiv = document.getElementById('countersList');
        if (!listDiv) return;
        listDiv.innerHTML = '';
        counters.forEach(c => {
            const div = document.createElement('div');
            div.className = 'counter-item';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                    <strong>Counter ${c.id} ${c.isClosed ? '🔴 Closed' : '🟢 Open'}</strong>
                    <span style="background:#eef2ff; padding:2px 10px; border-radius:40px;">${c.currentToken || '---'}</span>
                </div>
                <div style="margin:6px 0;">✅ Served: ${c.servedCount || 0}</div>
                <div class="counter-actions">
                    <button class="action-btn btn-call" onclick="callNewToken(${c.id})" ${c.isClosed ? 'disabled' : ''}>📞 Call</button>
                    <button class="action-btn btn-skip" onclick="skipToken(${c.id})" ${!c.currentToken ? 'disabled' : ''}>⏭ Skip</button>
                    <button class="action-btn btn-repeat" onclick="repeatToken(${c.id})" ${!c.currentToken ? 'disabled' : ''}>🔁 Repeat</button>
                    <button class="action-btn" onclick="toggleCounterClose(${c.id})" style="background:#64748b;">${c.isClosed ? 'Open' : 'Close'}</button>
                    <button class="btn-visibility ${c.visible ? '' : 'hidden-toggle'}" onclick="toggleVisibility(${c.id})">👁️ ${c.visible ? 'Visible' : 'Hidden'}</button>
                </div>
            `;
            listDiv.appendChild(div);
        });
    }
    
    function renderDisplayUI() {
        const grid = document.getElementById('displayCountersGrid');
        if (!grid) return;
        grid.innerHTML = '';
        const visibleCounters = counters.filter(c => c.visible !== false);
        visibleCounters.forEach(c => {
            let cardClass = 'idle';
            if (c.isClosed) cardClass = 'closed';
            else if (c.currentToken) cardClass = 'active';
            const card = document.createElement('div');
            card.className = `counter-card ${cardClass}`;
            card.setAttribute('data-counter-id', c.id);
            card.innerHTML = `
                <div class="counter-number">Counter ${c.id}</div>
                <div class="display-current-token">${c.currentToken || '—'}</div>
                <div style="font-size:0.75rem; opacity:0.9;">✅ ${c.servedCount || 0}</div>
                <div class="call-ended-notice">✓ CALL ENDED</div>
            `;
            grid.appendChild(card);
        });
        const activeCount = counters.filter(c => !c.isClosed && c.currentToken).length;
        const totalServed = counters.reduce((s, c) => s + (c.servedCount || 0), 0);
        const closedCount = counters.filter(c => c.isClosed).length;
        document.getElementById('displayStats').innerHTML = `
            <div class="display-stat"><div class="display-stat-number">${activeCount}</div><div class="display-stat-label">🟢 Active</div></div>
            <div class="display-stat"><div class="display-stat-number">${totalServed}</div><div class="display-stat-label">✅ Completed</div></div>
            <div class="display-stat"><div class="display-stat-number">${closedCount}</div><div class="display-stat-label">🔴 Closed</div></div>
        `;
    }
    
    function initOfflineDetection() {
        const connectedRef = db.ref('.info/connected');
        connectedRef.on('value', (snap) => {
            const online = snap.val();
            document.getElementById('offlineIndicatorAdmin').style.display = online ? 'none' : 'block';
            document.getElementById('offlineIndicatorDisplay').style.display = online ? 'none' : 'block';
        });
    }
    
    function initVoices() {
        return new Promise(resolve => {
            if (window.speechSynthesis.getVoices().length) { selectVoices(); resolve(); }
            else window.speechSynthesis.onvoiceschanged = () => { selectVoices(); resolve(); };
        });
    }
    
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function toggleFullscreen() { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); }
    function updateDisplayClock() { const now = new Date(); document.getElementById('displayTime').innerHTML = now.toLocaleTimeString(); document.getElementById('displayDate').innerHTML = now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' }); }
    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2200); }
    
    function attachFirebase() {
        db.ref('counters').on('value', (snap) => { if (snap.exists()) { counters = snap.val().map(c => ({ ...c, visible: c.visible !== false })); renderAdminUI(); renderDisplayUI(); } });
        db.ref('config').on('value', (snap) => {
            if (snap.exists()) {
                config = snap.val();
                document.getElementById('nextTokenInput').value = config.next_token_id || 1;
                if (config.custom_announcement) setDisplayAnnouncement(config.custom_announcement, true);
                else if (config.last_announcement) setDisplayAnnouncement(config.last_announcement, false);
                else setDisplayAnnouncement("✨ ദാറുന്നജാത്ത് യു പി സ്കൂളിലേക്ക് സ്വാഗതം", false);
                updateLastTokenUI(config.last_called_token);
                if (config.tickerMessage) updateTickerMessage(config.tickerMessage);
                if (config.voice_ts && config.voice_ts > lastProcessedTs) {
                    lastProcessedTs = config.voice_ts;
                    if (config.custom_announcement && !config.custom_announcement.includes("സ്വാഗതം")) {
                        speakSmart(config.custom_announcement);
                    } else if (config.last_announcement && !config.last_announcement.includes("Welcome")) {
                        speakSmart(config.last_announcement);
                    }
                }
            }
        });
        db.ref('blink_effect').on('value', (snap) => { if (snap.exists()) { let cid = snap.val().counterId; let card = document.querySelector(`.counter-card[data-counter-id='${cid}']`); if (card) { card.classList.add('blink-global-card'); setTimeout(() => card.classList.remove('blink-global-card'), 2400); } } });
        db.ref('call_ended_effect').on('value', (snap) => { if (snap.exists()) { let cid = snap.val().counterId; let card = document.querySelector(`.counter-card[data-counter-id='${cid}']`); let notice = card?.querySelector('.call-ended-notice'); if (notice) { notice.classList.add('visible-white'); setTimeout(() => notice.classList.remove('visible-white'), 1600); } } });
    }
    
    function initData() {
        db.ref('counters').once('value', snap => { if (!snap.exists()) { let arr = []; for (let i = 1; i <= 14; i++) arr.push({ id: i, currentToken: null, servedCount: 0, isClosed: false, visible: true }); db.ref('counters').set(arr); } });
        db.ref('config').once('value', snap => { if (!snap.exists()) db.ref('config').set({ next_token_id: 1, last_called_token: null, last_announcement: '', tickerMessage: "✨ Welcome to Darunnajath UP School ✨" }); });
    }
    
    function login() { const email = document.getElementById('loginEmail').value, pw = document.getElementById('loginPassword').value; auth.signInWithEmailAndPassword(email, pw).then(() => { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('modeToggle').style.display = 'flex'; initData(); attachFirebase(); initVoices(); initOfflineDetection(); setMode('admin'); }).catch(e => document.getElementById('loginError').innerText = e.message); }
    function createAdminAccount() { const email = document.getElementById('loginEmail').value, pw = document.getElementById('loginPassword').value; auth.createUserWithEmailAndPassword(email, pw).then(() => alert("Admin created! Login now.")).catch(e => alert(e.message)); }
    function logout() { auth.signOut().then(() => location.reload()); }
    function setMode(mode) { currentMode = mode; document.getElementById('adminMode').classList.toggle('active', mode === 'admin'); document.getElementById('displayMode').classList.toggle('active', mode === 'display'); document.body.classList.toggle('display-active', mode === 'display'); if (mode === 'display') updateDisplayClock(); }
    
    auth.onAuthStateChanged(user => { if (user) { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('modeToggle').style.display = 'flex'; initData(); attachFirebase(); initVoices(); initOfflineDetection(); setMode('admin'); } });
    setInterval(() => { if (currentMode === 'display') updateDisplayClock(); }, 1000);
    
    document.getElementById('sendCustomAnnouncementBtn')?.addEventListener('click', sendCustomAnnouncement);
    document.getElementById('resetAnnouncementBtn')?.addEventListener('click', resetAnnouncementToWelcome);
    
    window.callNewToken = callNewToken; window.skipToken = skipToken; window.repeatToken = repeatToken; window.toggleCounterClose = toggleCounterClose; window.toggleVisibility = toggleVisibility;
    window.resetAll = resetAll; window.updateNextToken = updateNextToken; window.updateTicker = updateTicker;
    window.toggleTheme = toggleTheme; window.toggleFullscreen = toggleFullscreen; window.setMode = setMode;
    window.login = login; window.logout = logout; window.createAdminAccount = createAdminAccount;
</script>
</body>
</html>
