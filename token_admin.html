<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DNOUP SCHOOL KARUVARAKUNDU | Admission Poster</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Anek Malayalam', 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .poster-studio {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }
        .web-heading {
            text-align: center;
            padding: 20px 20px 0 20px;
            background: #fef9f0;
        }
        .web-heading h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e2f5e, #f7b32b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .studio-grid {
            display: flex;
            flex-wrap: wrap;
        }
        .controls-panel {
            flex: 1.2;
            min-width: 320px;
            background: #fef9f0;
            padding: 28px 24px;
            border-right: 1px solid #ffe0b5;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .preview-panel {
            flex: 1.8;
            background: #eef2fa;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-weight: 700;
            color: #1e2f5e;
            font-size: 1.1rem;
        }
        input, .file-label {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1.5px solid #e2dccd;
            background: white;
            font-size: 1rem;
            outline: none;
        }
        .file-label {
            background: #f0e7d6;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
        }
        #photoInput { display: none; }
        .cropper-area {
            background: #fff6ea;
            border-radius: 32px;
            padding: 16px;
            border: 1px solid #ffdead;
        }
        .btn {
            border: none;
            background: #2c3e66;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #f7b32b; color: #1e2f5e; }
        .poster-wrapper {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            display: flex;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 16px;
        }
        .download-btn {
            background: #1f8a4c;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .info-badge {
            font-size: 0.8rem;
            background: #e9ecf3;
            border-radius: 40px;
            padding: 8px 16px;
            text-align: center;
        }
        @media (max-width: 850px) {
            .studio-grid { flex-direction: column; }
            .web-heading h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="poster-studio">
    <div class="web-heading">
        <h1>DNOUP SCHOOL KARUVARAKUNDU</h1>
        <p>അഡ്മിഷൻ ക്യാമ്പയിൻ പോസ്റ്റർ ജനറേറ്റർ</p>
    </div>
    <div class="studio-grid">
        <div class="controls-panel">
            <div class="input-group">
                <label>🎓 വിദ്യാർത്ഥിയുടെ പേര് / Student Name</label>
                <input type="text" id="studentNameInput" placeholder="e.g. സുഹൈൽ/SUHAIL" autocomplete="off">
            </div>
            <div class="input-group">
                <label>📸 ഫോട്ടോ അപ്ലോഡ് ചെയ്യുക</label>
                <div class="file-label" onclick="document.getElementById('photoInput').click()">📁 തിരഞ്ഞെടുക്കുക</div>
                <input type="file" id="photoInput" accept="image/*">
            </div>
            <div class="cropper-area" id="cropperSection" style="display: none;">
                <div class="cropper-title">✂️ ക്രോപ്പ് ചെയ്യുക (Square)</div>
                <div id="cropImageContainer"><img id="cropImage" style="max-width:100%"></div>
                <div class="crop-actions">
                    <button class="btn btn-primary" id="applyCropBtn">✔️ Crop & Set</button>
                    <button class="btn" id="cancelCropBtn">Cancel</button>
                </div>
            </div>
            <div class="info-badge">©️SUHAIL KERALA</div>
        </div>
        <div class="preview-panel">
            <div class="poster-wrapper"><canvas id="posterCanvas" width="1200" height="1500"></canvas></div>
            <button id="downloadPosterBtn" class="download-btn">⬇️ പോസ്റ്റർ ഡൗൺലോഡ് ചെയ്യുക</button>
        </div>
    </div>
</div>

<script>
    const bgImageURL = 'https://i.ibb.co/sJtQ56z6/f2e8ca9e-a173-4d02-8beb-1181e00cde99.jpg';
    const canvas = document.getElementById('posterCanvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('studentNameInput');
    const photoInput = document.getElementById('photoInput');
    const cropperSection = document.getElementById('cropperSection');
    const cropImage = document.getElementById('cropImage');
    const applyCrop = document.getElementById('applyCropBtn');
    const cancelCrop = document.getElementById('cancelCropBtn');
    
    let cropper = null;
    let currentPhoto = null; // HTMLImageElement
    let background = new Image();
    let bgReady = false;
    
    // Rounded rect helper
    function roundedRect(ctx, x, y, w, h, r) {
        if (w < 2*r) r = w/2;
        if (h < 2*r) r = h/2;
        ctx.moveTo(x+r, y);
        ctx.lineTo(x+w-r, y);
        ctx.quadraticCurveTo(x+w, y, x+w, y+r);
        ctx.lineTo(x+w, y+h-r);
        ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        ctx.lineTo(x+r, y+h);
        ctx.quadraticCurveTo(x, y+h, x, y+h-r);
        ctx.lineTo(x, y+r);
        ctx.quadraticCurveTo(x, y, x+r, y);
        ctx.closePath();
    }
    
    // Draw poster: only background + photo + name
    function drawPoster() {
        if (!ctx) return;
        const w = canvas.width, h = canvas.height;
        
        // Background
        if (bgReady && background.complete && background.naturalWidth) {
            ctx.drawImage(background, 0, 0, w, h);
        } else {
            ctx.fillStyle = '#1e3c72';
            ctx.fillRect(0, 0, w, h);
        }
        
        // Photo (square, rounded, larger)
        const photoSize = 520;
        const photoX = (w - photoSize) / 2;
        const photoY = 300;
        const radius = 60;
        
        if (currentPhoto && currentPhoto.complete && currentPhoto.naturalWidth) {
            ctx.save();
            ctx.beginPath();
            roundedRect(ctx, photoX, photoY, photoSize, photoSize, radius);
            ctx.clip();
            ctx.drawImage(currentPhoto, photoX, photoY, photoSize, photoSize);
            ctx.restore();
            // Borders
            ctx.beginPath();
            roundedRect(ctx, photoX, photoY, photoSize, photoSize, radius);
            ctx.strokeStyle = "#FFD966";
            ctx.lineWidth = 6;
            ctx.stroke();
            ctx.beginPath();
            roundedRect(ctx, photoX, photoY, photoSize, photoSize, radius);
            ctx.strokeStyle = "#FFFFFF";
            ctx.lineWidth = 3;
            ctx.stroke();
        } else {
            ctx.fillStyle = "rgba(255,248,225,0.85)";
            ctx.beginPath();
            roundedRect(ctx, photoX, photoY, photoSize, photoSize, radius);
            ctx.fill();
            ctx.fillStyle = "#8b6946";
            ctx.font = "36px 'Anek Malayalam'";
            ctx.textAlign = "center";
            ctx.fillText("📷 PHOTO", photoX+photoSize/2, photoY+photoSize/2);
            ctx.font = "26px 'Anek Malayalam'";
            ctx.fillText("Upload & crop", photoX+photoSize/2, photoY+photoSize/2+55);
            ctx.textAlign = "left";
        }
        
        // Name - black, auto-scaled to fit width
        let name = nameInput.value.trim();
        if (name === "") name = "______";
        const maxWidth = w - 100; // 1100px available
        let fontSize = 64;
        ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
        while (ctx.measureText(name).width > maxWidth && fontSize > 24) {
            fontSize -= 2;
            ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
        }
        const nameY = photoY + photoSize + 100; // 300+520+100 = 920 (safe)
        ctx.fillStyle = "#000000";
        ctx.textAlign = "center";
        ctx.fillText(name, w/2, nameY);
        ctx.textAlign = "left";
    }
    
    // Update photo after crop
    function setPhotoFromDataURL(dataURL) {
        const img = new Image();
        img.onload = () => {
            currentPhoto = img;
            drawPoster();
        };
        img.src = dataURL;
    }
    
    // Cropper logic
    photoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            cropImage.src = ev.target.result;
            if (cropper) cropper.destroy();
            cropperSection.style.display = "block";
            cropper = new Cropper(cropImage, {
                aspectRatio: 1,
                viewMode: 2,
                autoCropArea: 0.9,
                cropBoxMovable: true,
                cropBoxResizable: true,
                zoomable: true
            });
        };
        reader.readAsDataURL(file);
    });
    
    applyCrop.addEventListener('click', () => {
        if (!cropper) return;
        const croppedCanvas = cropper.getCroppedCanvas({ width: 600, height: 600 });
        if (croppedCanvas) {
            setPhotoFromDataURL(croppedCanvas.toDataURL());
        }
        cropperSection.style.display = "none";
        cropper.destroy();
        cropper = null;
        photoInput.value = '';
    });
    
    cancelCrop.addEventListener('click', () => {
        cropperSection.style.display = "none";
        if (cropper) cropper.destroy();
        cropper = null;
        photoInput.value = '';
    });
    
    nameInput.addEventListener('input', () => drawPoster());
    
    // Download HD
    document.getElementById('downloadPosterBtn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `admission_${nameInput.value.trim() || 'poster'}.png`;
        canvas.toBlob(blob => {
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
        });
    });
    
    // Load background
    background.crossOrigin = "Anonymous";
    background.onload = () => { bgReady = true; drawPoster(); };
    background.onerror = () => { bgReady = true; drawPoster(); };
    background.src = bgImageURL;
    drawPoster();
</script>
</body>
</html>
