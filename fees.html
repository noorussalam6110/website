<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noorussalam-Fees Pending</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Anek Malayalam', sans-serif;
            background: linear-gradient(135deg, #0b5e2e 0%, #1b7e42 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #0a4b2a 0%, #0d5e35 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .badge {
            background: #ff9800;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.75rem;
            margin-top: 12px;
        }

        .content {
            padding: 35px 25px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #0a4b2a;
            margin-bottom: 8px;
        }

        label i {
            color: #ff9800;
            margin-right: 8px;
        }

        .mobile-wrapper {
            position: relative;
        }

        .mobile-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 15px 18px 15px 48px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 60px;
            outline: none;
            font-family: monospace;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #1b7e42;
            box-shadow: 0 0 0 3px rgba(27, 126, 66, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0a4b2a 0%, #1b7e42 100%);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(11, 94, 46, 0.3);
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1b7e42;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-card {
            margin-top: 25px;
            padding: 20px;
            border-radius: 25px;
            background: #f8f9fa;
            border-left: 6px solid #1b7e42;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .result-card.error {
            background: #ffebee;
            border-left-color: #c62828;
        }

        .result-card h4 {
            color: #0a4b2a;
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-card.error h4 {
            color: #c62828;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #ddd;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #555;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-label i {
            width: 22px;
            color: #ff9800;
        }

        .detail-value {
            color: #0a4b2a;
            font-weight: 500;
            text-align: right;
        }

        .pending-badge {
            background: #ff9800;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .success-badge {
            background: #2e7d32;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .message-box {
            margin-top: 15px;
            padding: 12px;
            background: #e8f5e9;
            border-radius: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        .footer {
            text-align: center;
            padding: 18px;
            background: #f1f1f1;
            font-size: 0.7rem;
            color: #777;
        }

        .info {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 0.7rem;
            text-align: center;
            color: #1565c0;
        }

        @media (max-width: 480px) {
            .content { padding: 25px 18px; }
            .detail-row { flex-direction: column; align-items: flex-start; gap: 5px; }
            .detail-value { text-align: left; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>നൂറുസ്സലാം മദ്റസ</h1>
        <p>കമ്പിപ്പാലം</p>
        <div class="badge">
            <i class="fas fa-mosque"></i> വരിസംഖ്യ വിവര സംവിധാനം
        </div>
    </div>

    <div class="content">
        <div class="input-group">
            <label><i class="fas fa-phone-alt"></i> രജിസ്റ്റർ ചെയ്ത മൊബൈൽ നമ്പർ</label>
            <div class="mobile-wrapper">
                <i class="fas fa-mobile-alt"></i>
                <input type="tel" id="mobile" placeholder="9876543210" maxlength="10" autocomplete="off">
            </div>
        </div>

        <button onclick="checkFee()" id="checkBtn">
            <i class="fas fa-search"></i> പരിശോധിക്കുക
        </button>

        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>ദയവായി കാത്തിരിക്കുക...</p>
        </div>

        <div id="result"></div>

        <div class="info">
            <i class="fas fa-info-circle"></i> വിവരങ്ങളിൽ എന്തെങ്കിലും തെറ്റുണ്ടെങ്കിൽ മദ്റസ ഓഫീസിൽ ബന്ധപ്പെടുക
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-mosque"></i> NOORUSSALAM MADRASA © 2026
    </div>
</div>

<script>
    // ==================================================
    // ⚠️ IMPORTANT: Replace with your Apps Script URL
    // ==================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbzZuLonYDOXK5V2n0wpMVVe5Qy-v4pEePZcGrz7GGpzootZSg7IUCl388fI2nHkohx9Ug/exec";
    
    // Test mode (set to true to test without API)
    const TEST_MODE = false;
    const TEST_DATA = {
        success: true,
        parentName: "അബ്ദുൽ റഹീം",
        lastPaidMonth: "മാർച്ച് 2026",
        paidMonths: 9,
        pendingMonths: 15,
        previousBalance: 500,
        totalPending: 3500,
        lastPaidDate: "2026-03-15",
        message: "📌 3500 രൂപ ബാക്കിയുണ്ട്"
    };

    let currentCallback = null;

    function checkFee() {
        const mobile = document.getElementById("mobile").value.trim();
        
        if (mobile.length !== 10 || isNaN(mobile)) {
            showError("10 അക്ക മൊബൈൽ നമ്പർ ശരിയായി നൽകുക.");
            return;
        }

        // Test mode
        if (TEST_MODE && mobile === "9876543210") {
            showResult(TEST_DATA);
            return;
        }

        // Show loader
        const btn = document.getElementById("checkBtn");
        btn.disabled = true;
        btn.style.opacity = "0.7";
        document.getElementById("loader").style.display = "block";
        document.getElementById("result").innerHTML = "";

        // Remove existing script if any
        if (currentCallback) {
            delete window[currentCallback];
        }

        // Generate unique callback name
        const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
        currentCallback = callbackName;
        
        // Create callback function
        window[callbackName] = function(data) {
            // Clean up
            delete window[callbackName];
            const script = document.getElementById("jsonpScript");
            if (script) script.remove();
            
            // Process data
            if (data && data.success !== undefined) {
                showResult(data);
            } else {
                showError("Invalid response from server");
            }
            
            // Hide loader
            btn.disabled = false;
            btn.style.opacity = "1";
            document.getElementById("loader").style.display = "none";
        };
        
        // Create script tag for JSONP request
        const script = document.createElement("script");
        script.id = "jsonpScript";
        const url = `${API_URL}?mobile=${encodeURIComponent(mobile)}&callback=${callbackName}`;
        script.src = url;
        
        script.onerror = function() {
            // Clean up on error
            delete window[callbackName];
            document.getElementById("loader").style.display = "none";
            btn.disabled = false;
            btn.style.opacity = "1";
            showError("സെർവറുമായി ബന്ധപ്പെടാൻ കഴിഞ്ഞില്ല. Apps Script URL ശരിയാണോ എന്ന് പരിശോധിക്കുക.");
        };
        
        document.head.appendChild(script);
    }

    function showResult(data) {
        const resultDiv = document.getElementById("result");
        
        if (data.success) {
            const currentMonthFee = (data.pendingMonths || 0) * 200;
            const badge = data.totalPending == 0 
                ? '<span class="success-badge"><i class="fas fa-check-circle"></i> ഫീസ് പൂർണ്ണമായി അടച്ചു</span>'
                : `<span class="pending-badge"><i class="fas fa-clock"></i> ⏳ ${data.totalPending.toLocaleString()} രൂപ ബാക്കി</span>`;
            
            resultDiv.innerHTML = `
                <div class="result-card">
                    <h4><i class="fas fa-receipt"></i> ഫീസ് വിവരം</h4>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-user-friends"></i> രക്ഷിതാവ്</span>
                        <span class="detail-value">${escapeHtml(data.parentName)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-calendar-alt"></i> അവസാനം അടച്ച മാസം</span>
                        <span class="detail-value">${escapeHtml(data.lastPaidMonth || "വിവരം ലഭ്യമല്ല")}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-check-circle"></i> അടച്ച മാസങ്ങൾ</span>
                        <span class="detail-value">${data.paidMonths} മാസങ്ങൾ</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-hourglass-half"></i> ബാക്കി മാസങ്ങൾ</span>
                        <span class="detail-value">${data.pendingMonths} മാസങ്ങൾ (${currentMonthFee.toLocaleString()} രൂപ)</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-history"></i> മുൻപത്തെ ബാക്കി</span>
                        <span class="detail-value">₹ ${data.previousBalance.toLocaleString()}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label"><i class="fas fa-rupee-sign"></i> ആകെ ബാക്കി</span>
                        <span class="detail-value">${badge}</span>
                    </div>
                    <div class="message-box">
                        <i class="fas fa-envelope"></i> ${escapeHtml(data.message)}
                    </div>
                </div>
            `;
        } else {
            resultDiv.innerHTML = `
                <div class="result-card error">
                    <h4><i class="fas fa-exclamation-triangle"></i> കണ്ടെത്തിയില്ല</h4>
                    <p>${escapeHtml(data.message)}</p>
                </div>
            `;
        }
        
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showError(msg) {
        document.getElementById("result").innerHTML = `
            <div class="result-card error">
                <h4><i class="fas fa-exclamation-circle"></i> പിശക്</h4>
                <p>${escapeHtml(msg)}</p>
            </div>
        `;
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Enter key support
    document.getElementById("mobile").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            checkFee();
        }
    });
    
    document.getElementById("mobile").focus();
    console.log("✅ Madrasa Fee Checker Ready (JSONP Mode)");
    console.log("📡 API URL:", API_URL);
</script>
</body>
</html>
