<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>നൂറുസ്സലാം മദ്രസ - ഫീസ് വിവരം</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Anek Malayalam',sans-serif;background:linear-gradient(135deg,#0b5e2e 0%,#1b7e42 100%);min-height:100vh;padding:16px;display:flex;justify-content:center;align-items:center}
        .container{max-width:500px;width:100%;background:white;border-radius:32px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
        .header{background:linear-gradient(135deg,#0a4b2a 0%,#0d5e35 100%);padding:28px 20px;text-align:center;color:white}
        .header h1{font-size:1.6rem;font-weight:700}
        .badge{background:#ff9800;display:inline-block;padding:5px 15px;border-radius:30px;font-size:0.7rem;margin-top:12px}
        .content{padding:30px 24px}
        input{width:100%;padding:14px 18px;font-size:1rem;border:2px solid #e0e0e0;border-radius:60px;text-align:center;font-family:monospace;font-size:1.1rem}
        input:focus{border-color:#1b7e42;outline:none}
        button{width:100%;padding:14px;background:linear-gradient(135deg,#0a4b2a 0%,#1b7e42 100%);color:white;border:none;border-radius:60px;font-size:1.1rem;font-weight:600;cursor:pointer}
        .loader{display:none;text-align:center;padding:20px}
        .spinner{width:40px;height:40px;border:3px solid #f3f3f3;border-top:3px solid #1b7e42;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .result-card{margin-top:25px;padding:20px;border-radius:24px;background:#f8f9fa;border-left:5px solid #1b7e42}
        .result-card.error{background:#ffebee;border-left-color:#c62828}
        .info-box{padding:12px;margin:8px 0;background:white;border-radius:16px;border:1px solid #eee}
        .info-label{font-size:0.7rem;color:#888;text-transform:uppercase}
        .info-value{font-size:1.1rem;font-weight:700;color:#0a4b2a}
        .whatsapp-btn{background:#25D366;color:white;padding:12px;border-radius:50px;text-align:center;margin-top:15px;display:block;text-decoration:none;font-weight:600}
        .footer{text-align:center;padding:16px;background:#f1f1f1;font-size:0.7rem}
        .footer a{color:#0a4b2a;text-decoration:none}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📖 നൂറുസ്സലാം മദ്രസ</h1>
        <p>കമ്പിപ്പാലം</p>
        <div class="badge">📱 ഫീസ് വിവര സംവിധാനം</div>
    </div>

    <div class="content">
        <input type="tel" id="mobile" placeholder="9876543210" maxlength="10" autocomplete="off">
        <button onclick="checkFee()" id="checkBtn">🔍 പരിശോധിക്കുക</button>
        <div id="loader" class="loader"><div class="spinner"></div><p>ദയവായി കാത്തിരിക്കുക...</p></div>
        <div id="result"></div>
    </div>

    <div class="footer">
        <a href="admin.html">🔐 അഡ്മിൻ ലോഗിൻ</a> | നൂറുസ്സലാം മദ്രസ കമ്പിപ്പാലം © 2026
    </div>
</div>

<script>
    // ⚠️ REPLACE WITH YOUR APPS SCRIPT URL
    const API_URL = "https://script.google.com/macros/s/AKfycbxiOZWTy5DdVCDajih7jSQ_YtgYIBavtkkj_CMXHi0glIogIslC8qy62IRNYJHI0FjbOw/exec";
    
    let currentScript = null;
    
    function checkFee() {
        const mobile = document.getElementById("mobile").value.trim();
        
        if (mobile.length !== 10 || isNaN(mobile)) {
            showError("10 അക്ക മൊബൈൽ നമ്പർ ശരിയായി നൽകുക.");
            return;
        }
        
        const btn = document.getElementById("checkBtn");
        btn.disabled = true;
        btn.style.opacity = "0.7";
        document.getElementById("loader").style.display = "block";
        document.getElementById("result").innerHTML = "";
        
        if (currentScript) {
            document.head.removeChild(currentScript);
        }
        
        const callbackName = "callback_" + Date.now();
        
        window[callbackName] = function(data) {
            delete window[callbackName];
            btn.disabled = false;
            btn.style.opacity = "1";
            document.getElementById("loader").style.display = "none";
            
            if (data && data.success === true) {
                displayResult(data);
            } else if (data && data.success === false) {
                showError(data.message);
            } else {
                showError("വിവരങ്ങൾ ലഭ്യമല്ല. ശരിയായ മൊബൈൽ നമ്പർ നൽകുക.");
            }
        };
        
        const script = document.createElement("script");
        script.src = `${API_URL}?mobile=${mobile}&callback=${callbackName}`;
        script.onerror = function() {
            delete window[callbackName];
            btn.disabled = false;
            btn.style.opacity = "1";
            document.getElementById("loader").style.display = "none";
            showError("API-യുമായി ബന്ധപ്പെടാൻ കഴിഞ്ഞില്ല. URL ശരിയാണോ എന്ന് പരിശോധിക്കുക.");
        };
        currentScript = script;
        document.head.appendChild(script);
    }
    
    function displayResult(data) {
        const resultDiv = document.getElementById("result");
        const whatsappLink = `https://wa.me/91${data.mobile}?text=നമസ്കാരം%20${encodeURIComponent(data.parentName)}%2C%20നിങ്ങളുടെ%20ബാക്കി%20തുക%20₹${data.totalPending}%20ആണ്`;
        
        resultDiv.innerHTML = `
            <div class="result-card">
                <div class="info-box">
                    <div class="info-label">👪 രക്ഷിതാവിൻ്റെ പേര്</div>
                    <div class="info-value">${escapeHtml(data.parentName)}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">📅 അവസാനം അടച്ച മാസം</div>
                    <div class="info-value">${escapeHtml(data.lastPaidMonth)}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">✅ അടച്ച മാസങ്ങൾ</div>
                    <div class="info-value">${data.paidMonths} മാസം</div>
                </div>
                <div class="info-box">
                    <div class="info-label">⏳ ബാക്കി മാസങ്ങൾ</div>
                    <div class="info-value">${data.pendingMonths} മാസം</div>
                </div>
                <div class="info-box">
                    <div class="info-label">💰 മുൻപത്തെ ബാക്കി</div>
                    <div class="info-value">₹ ${(data.previousBalance || 0).toLocaleString()}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">📊 ആകെ ബാക്കി തുക</div>
                    <div class="info-value" style="color:${data.totalPending > 0 ? '#ff9800' : '#2e7d32'}">₹ ${(data.totalPending || 0).toLocaleString()}</div>
                </div>
                <div class="info-box">
                    <div class="info-label">💬 സന്ദേശം</div>
                    <div class="info-value">${escapeHtml(data.message)}</div>
                </div>
                <a href="${whatsappLink}" target="_blank" class="whatsapp-btn">📱 WhatsApp-ൽ വിവരം ലഭിക്കുക</a>
            </div>
        `;
    }
    
    function showError(msg) {
        document.getElementById("result").innerHTML = `
            <div class="result-card error">
                <div class="info-box">
                    <div class="info-label">⚠️ പിശക്</div>
                    <div class="info-value">${escapeHtml(msg)}</div>
                </div>
            </div>
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById("mobile").addEventListener("keypress", function(e) {
        if (e.key === "Enter") checkFee();
    });
</script>
</body>
</html>
