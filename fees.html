<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>നൂറുസ്സലാം മദ്രസ - ഫീസ് സ്റ്റാറ്റസ്</title>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Anek Malayalam', sans-serif;
      background: linear-gradient(135deg, #0b5e2e 0%, #1b7e42 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      border-radius: 35px;
      overflow: hidden;
      box-shadow: 0 25px 45px rgba(0,0,0,0.25);
    }
    .header {
      background: #0a4b2a;
      padding: 25px 20px;
      text-align: center;
      color: white;
    }
    .header h1 { font-size: 1.6rem; font-weight: 700; }
    .content { padding: 30px 25px; }
    input {
      width: 100%;
      padding: 14px 18px;
      font-size: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 50px;
      text-align: center;
      letter-spacing: 2px;
      margin: 10px 0;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #0a4b2a;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
    }
    .result-card {
      margin-top: 25px;
      padding: 20px;
      border-radius: 25px;
      background: #f8f9fa;
      border-left: 6px solid #1b7e42;
    }
    .result-card.error { background: #ffebee; border-left-color: #c62828; }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed #ddd;
    }
    .detail-label { font-weight: 600; color: #555; }
    .detail-value { color: #0a4b2a; font-weight: 500; }
    .pending-badge {
      background: #ff9800;
      color: white;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
    }
    .footer {
      text-align: center;
      padding: 15px;
      background: #f1f1f1;
      font-size: 0.7rem;
    }
    .loader { display: none; text-align: center; padding: 15px; }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #1b7e42;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📖 നൂറുസ്സലാം മദ്രസ</h1>
    <p>കമ്പിപ്പാലം - ഫീസ് വിവര പരിശോധന</p>
  </div>
  <div class="content">
    <input type="tel" id="mobile" placeholder="രജിസ്റ്റർ ചെയ്ത മൊബൈൽ നമ്പർ" maxlength="10">
    <button onclick="checkFee()">🔍 പരിശോധിക്കുക</button>
    <div id="loader" class="loader"><div class="spinner"></div><p>ദയവായി കാത്തിരിക്കുക...</p></div>
    <div id="result"></div>
  </div>
  <div class="footer">നൂറുസ്സലാം മദ്രസ കമ്പിപ്പാലം © 2026</div>
</div>

<script>
  // ⚙️ Replace with your Apps Script Web App URL
  const API_URL = "https://script.google.com/macros/s/AKfycbx2MitwtZ4nvlp6No-IfY24PTVK-eUzCS6HmaNOOcln57iKG3xonqqDVDyVFyngkrLa3A/exec";

  async function checkFee() {
    const mobile = document.getElementById("mobile").value.trim();
    if (mobile.length !== 10 || isNaN(mobile)) {
      showError("10 അക്ക മൊബൈൽ നമ്പർ ശരിയായി നൽകുക.");
      return;
    }
    
    document.getElementById("loader").style.display = "block";
    document.getElementById("result").innerHTML = "";
    
    try {
      const url = `${API_URL}?mobile=${encodeURIComponent(mobile)}`;
      const response = await fetch(url);
      const data = await response.json();
      showResult(data);
    } catch (err) {
      showError("സാങ്കേതിക തകരാർ. പിന്നീട് ശ്രമിക്കുക.");
      console.error(err);
    } finally {
      document.getElementById("loader").style.display = "none";
    }
  }

  function showResult(data) {
    const resultDiv = document.getElementById("result");
    if (data.success) {
      const badge = data.totalPending == 0 ? "✅ ഫീസ് പൂർണ്ണമായി അടച്ചു" : 
                    `<span class="pending-badge">⏳ ${data.totalPending} രൂപ ബാക്കി</span>`;
      resultDiv.innerHTML = `
        <div class="result-card">
          <h4>📋 ഫീസ് വിവരം</h4>
          <div class="detail-row"><span class="detail-label">👪 രക്ഷിതാവ്</span><span class="detail-value">${data.parentName}</span></div>
          <div class="detail-row"><span class="detail-label">📅 അവസാനം അടച്ച മാസം</span><span class="detail-value">${data.lastPaidMonth}</span></div>
          <div class="detail-row"><span class="detail-label">✅ അടച്ച മാസങ്ങൾ</span><span class="detail-value">${data.paidMonths}</span></div>
          <div class="detail-row"><span class="detail-label">⏳ ബാക്കി മാസങ്ങൾ</span><span class="detail-value">${data.pendingMonths}</span></div>
          <div class="detail-row"><span class="detail-label">💰 മുൻപത്തെ ബാക്കി</span><span class="detail-value">₹${data.previousBalance}</span></div>
          <div class="detail-row"><span class="detail-label">📊 ആകെ ബാക്കി</span><span class="detail-value">${badge}</span></div>
          <div style="margin-top:15px; padding:10px; background:#e8f5e9; border-radius:15px;">${data.message}</div>
        </div>`;
    } else {
      resultDiv.innerHTML = `<div class="result-card error"><h4>❌ കണ്ടെത്തിയില്ല</h4><p>${data.message}</p></div>`;
    }
  }

  function showError(msg) {
    document.getElementById("result").innerHTML = `<div class="result-card error"><h4>⚠️ പിശക്</h4><p>${msg}</p></div>`;
  }
</script>
</body>
</html>
