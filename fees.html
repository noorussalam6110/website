<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noorussalam-fee Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Anek Malayalam',sans-serif;background:linear-gradient(135deg,#0b5e2e 0%,#1b7e42 100%);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:center}
        .container{max-width:500px;width:100%;background:white;border-radius:35px;overflow:hidden;box-shadow:0 25px 50px rgba(0,0,0,0.3);animation:fadeIn 0.5s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .header{background:linear-gradient(135deg,#0a4b2a 0%,#0d5e35 100%);padding:30px 20px;text-align:center;color:white}
        .header h1{font-size:1.8rem;font-weight:700}
        .badge{background:#ff9800;display:inline-block;padding:5px 15px;border-radius:30px;font-size:0.75rem;margin-top:12px}
        .content{padding:35px 25px}
        input{width:100%;padding:15px 18px;font-size:1rem;border:2px solid #e0e0e0;border-radius:60px;text-align:center;margin:10px 0}
        button{width:100%;padding:15px;background:linear-gradient(135deg,#0a4b2a 0%,#1b7e42 100%);color:white;border:none;border-radius:60px;font-size:1.1rem;font-weight:600;cursor:pointer;transition:0.3s}
        button:hover{transform:translateY(-2px)}
        .result-card{margin-top:25px;padding:20px;border-radius:25px;background:#f8f9fa;border-left:6px solid #1b7e42}
        .result-card.error{background:#ffebee;border-left-color:#c62828}
        .detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed #ddd}
        .detail-label{font-weight:600;color:#555}
        .detail-value{color:#0a4b2a;font-weight:500;text-align:right}
        .pending-badge{background:#ff9800;color:white;padding:4px 12px;border-radius:30px;font-size:0.8rem}
        .success-badge{background:#2e7d32;color:white;padding:4px 12px;border-radius:30px;font-size:0.8rem}
        .message-box{margin-top:15px;padding:12px;background:#e8f5e9;border-radius:15px;text-align:center}
        .whatsapp-btn{background:#25D366;color:white;padding:12px;border-radius:60px;text-align:center;margin-top:15px;display:block;text-decoration:none;font-weight:600}
        .footer{text-align:center;padding:18px;background:#f1f1f1;font-size:0.7rem}
        .loader{display:none;text-align:center;padding:20px}
        .spinner{width:40px;height:40px;border:3px solid #f3f3f3;border-top:3px solid #1b7e42;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        @media (max-width:480px){.detail-row{flex-direction:column;align-items:flex-start;gap:5px}.detail-value{text-align:left}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>നൂറുസ്സലാം മദ്‌റസ</h1>
        <p>കമ്പിപ്പാലം</p>
        <div class="badge"> ഫീസ് വിവര സംവിധാനം</div>
    </div>
    <div class="content">
        <input type="tel" id="mobile" placeholder="രജിസ്റ്റർ ചെയ്ത മൊബൈൽ നമ്പർ" maxlength="10">
        <button onclick="checkFee()">🔍 പരിശോധിക്കുക</button>
        <div id="loader" class="loader"><div class="spinner"></div><p>ദയവായി കാത്തിരിക്കുക...</p></div>
        <div id="result"></div>
    </div>
    <div class="footer">
        <a href="admin.html" style="color:#0a4b2a; text-decoration:none;">🔐 അഡ്മിൻ ലോഗിൻ</a> | നൂറുസ്സലാം മദ്രസ കമ്പിപ്പാലം © 2026
    </div>
</div>

<script>
    // ⚠️ IMPORTANT: Replace with your Apps Script URL
    const API_URL = "https://script.google.com/macros/s/AKfycbyLCpOgCeKsyC3yRuIxTQRd6JFyUcptA8VWE8ER13pMSmNQ5Ef7iud55iHBGY3R_CktnQ/exec";
    
    let currentCallback = null;
    
    function checkFee() {
        const mobile = document.getElementById("mobile").value.trim();
        if (mobile.length !== 10 || isNaN(mobile)) {
            showError("10 അക്ക മൊബൈൽ നമ്പർ ശരിയായി നൽകുക.");
            return;
        }
        const btn = document.querySelector("button");
        btn.disabled = true;
        btn.style.opacity = "0.7";
        document.getElementById("loader").style.display = "block";
        document.getElementById("result").innerHTML = "";
        
        if (currentCallback) delete window[currentCallback];
        const callbackName = "jsonpCallback_" + Date.now();
        currentCallback = callbackName;
        
        window[callbackName] = function(data) {
            delete window[callbackName];
            btn.disabled = false;
            btn.style.opacity = "1";
            document.getElementById("loader").style.display = "none";
            if (data && data.success !== undefined) {
                showResult(data);
            } else {
                showError("Invalid response from server");
            }
        };
        
        const script = document.createElement("script");
        script.src = `${API_URL}?mobile=${encodeURIComponent(mobile)}&callback=${callbackName}`;
        script.onerror = function() {
            delete window[callbackName];
            btn.disabled = false;
            btn.style.opacity = "1";
            document.getElementById("loader").style.display = "none";
            showError("സെർവറുമായി ബന്ധപ്പെടാൻ കഴിഞ്ഞില്ല. Apps Script URL ശരിയാണോ എന്ന് പരിശോധിക്കുക.");
        };
        document.head.appendChild(script);
    }
    
    function showResult(data) {
        const resultDiv = document.getElementById("result");
        if (data.success) {
            const currentMonthFee = (data.pendingMonths || 0) * 200;
            const badge = data.totalPending == 0 
                ? '<span class="success-badge">✅ ഫീസ് പൂർണ്ണമായി അടച്ചു</span>'
                : `<span class="pending-badge">⏳ ${data.totalPending.toLocaleString()} രൂപ ബാക്കി</span>`;
            
            const whatsappMsg = `നമസ്കാരം ${data.parentName}%0A%0A📖 *നൂറുസ്സലാം മദ്രസ കമ്പിപ്പാലം*%0A💰 *ബാക്കി തുക:* ₹${data.totalPending}%0A📅 *അവസാനം അടച്ച മാസം:* ${data.lastPaidMonth}%0A%0Aദയവായി നിങ്ങളുടെ ഫീസ് അടക്കുക.%0A🙏 നന്ദി.`;
            const whatsappLink = `https://wa.me/91${data.mobile}?text=${whatsappMsg}`;
            
            resultDiv.innerHTML = `
                <div class="result-card">
                    <h4>📋 ഫീസ് വിവരം</h4>
                    <div class="detail-row"><span class="detail-label">👪 രക്ഷിതാവ്</span><span class="detail-value">${escapeHtml(data.parentName)}</span></div>
                    <div class="detail-row"><span class="detail-label">📅 അവസാനം അടച്ച മാസം</span><span class="detail-value">${escapeHtml(data.lastPaidMonth)}</span></div>
                    <div class="detail-row"><span class="detail-label">✅ അടച്ച മാസങ്ങൾ</span><span class="detail-value">${data.paidMonths}</span></div>
                    <div class="detail-row"><span class="detail-label">⏳ ബാക്കി മാസങ്ങൾ</span><span class="detail-value">${data.pendingMonths} (${currentMonthFee.toLocaleString()} രൂപ)</span></div>
                    <div class="detail-row"><span class="detail-label">💰 മുൻപത്തെ ബാക്കി</span><span class="detail-value">₹${data.previousBalance.toLocaleString()}</span></div>
                    <div class="detail-row"><span class="detail-label">📊 ആകെ ബാക്കി</span><span class="detail-value">${badge}</span></div>
                    <div class="message-box">${escapeHtml(data.message)}</div>
                    <a href="${whatsappLink}" target="_blank" class="whatsapp-btn">📱 WhatsApp-ൽ വിവരം ലഭിക്കുക</a>
                </div>`;
        } else {
            resultDiv.innerHTML = `<div class="result-card error"><h4>❌ കണ്ടെത്തിയില്ല</h4><p>${escapeHtml(data.message)}</p></div>`;
        }
    }
    
    function showError(msg) {
        document.getElementById("result").innerHTML = `<div class="result-card error"><h4>⚠️ പിശക്</h4><p>${escapeHtml(msg)}</p></div>`;
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById("mobile").addEventListener("keypress", function(e) {
        if (e.key === "Enter") checkFee();
    });
    document.getElementById("mobile").focus();
    console.log("✅ Madrasa Fee Checker Ready");
    console.log("📡 API URL:", API_URL);
</script>
</body>
</html>
