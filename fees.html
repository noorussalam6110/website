<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noorussalam - Fees Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Anek Malayalam', sans-serif;
            background: linear-gradient(135deg, #0b5e2e 0%, #1b7e42 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .header {
            background: linear-gradient(135deg, #0a4b2a 0%, #0d5e35 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .badge {
            background: #ff9800;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.75rem;
            margin-top: 12px;
        }

        .content {
            padding: 35px 25px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #0a4b2a;
            margin-bottom: 8px;
        }

        .mobile-wrapper {
            position: relative;
        }

        .mobile-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 15px 18px 15px 48px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 60px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #1b7e42;
            box-shadow: 0 0 0 3px rgba(27, 126, 66, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0a4b2a 0%, #1b7e42 100%);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(11, 94, 46, 0.3);
        }

        .footer {
            text-align: center;
            padding: 18px;
            background: #f1f1f1;
            font-size: 0.7rem;
            color: #777;
        }

        .footer a {
            color: #0a4b2a;
            text-decoration: none;
        }

        /* Loading Spinner */
        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1b7e42;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Result Card - Direct Display (No Modal for Speed) */
        .result-card {
            margin-top: 25px;
            padding: 20px;
            border-radius: 25px;
            background: #f8f9fa;
            border-left: 6px solid #1b7e42;
            animation: fadeIn 0.3s ease;
        }

        .result-card.error {
            background: #ffebee;
            border-left-color: #c62828;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Boxes Grid */
        .boxes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .info-box {
            background: white;
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #e8e8e8;
        }

        .info-box.full-width {
            grid-column: span 2;
        }

        .info-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .info-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0a4b2a;
            word-break: break-word;
        }

        .pending-value {
            color: #ff9800;
        }

        .success-value {
            color: #2e7d32;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            margin-top: 15px;
            display: block;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .whatsapp-btn:hover {
            background: #1da851;
            transform: scale(1.02);
        }

        @media (max-width: 480px) {
            .boxes-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .info-box.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>നൂറുസ്സലാം മദ്രസ</h1>
        <p>കമ്പിപ്പാലം</p>
        <div class="badge">ഫീസ് വിവര സംവിധാനം</div>
    </div>

    <div class="content">
        <div class="input-group">
            <label>📱 രജിസ്റ്റർ ചെയ്ത മൊബൈൽ നമ്പർ</label>
            <div class="mobile-wrapper">
                <i>📞</i>
                <input type="tel" id="mobile" placeholder="9876543210" maxlength="10" autocomplete="off">
            </div>
        </div>

        <button onclick="checkFee()" id="checkBtn">
            🔍 പരിശോധിക്കുക
        </button>

        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>ദയവായി കാത്തിരിക്കുക...</p>
        </div>

        <div id="result"></div>
    </div>

    <div class="footer">
        <a href="admin.html">🔐 അഡ്മിൻ ലോഗിൻ</a> | നൂറുസ്സലാം മദ്രസ കമ്പിപ്പാലം © 2026
    </div>
</div>

<script>
    // ========== CONFIGURATION ==========
    const API_URL = "https://script.google.com/macros/s/AKfycbx7qGE_uBohGUVmpoh_-Fxj39hRpbSW_wTg5vsvnPSdoT6lK7xklnMc9s5EFcvdlbKYcg/exec";
    
    // Malayalam months
    const malayalamMonths = {
        "January": "ജനുവരി", "February": "ഫെബ്രുവരി", "March": "മാർച്ച്",
        "April": "ഏപ്രിൽ", "May": "മേയ്", "June": "ജൂൺ",
        "July": "ജൂലൈ", "August": "ഓഗസ്റ്റ്", "September": "സെപ്റ്റംബർ",
        "October": "ഒക്ടോബർ", "November": "നവംബർ", "December": "ഡിസംബർ"
    };
    
    function formatDateToMalayalam(dateString) {
        if (!dateString) return "വിവരം ലഭ്യമല്ല";
        
        // If already in Malayalam format
        for (var key in malayalamMonths) {
            if (dateString.includes(key)) {
                return dateString.replace(key, malayalamMonths[key]);
            }
        }
        
        try {
            var date = new Date(dateString);
            if (isNaN(date.getTime())) return dateString;
            
            var monthNames = ["ജനുവരി", "ഫെബ്രുവരി", "മാർച്ച്", "ഏപ്രിൽ", "മേയ്", "ജൂൺ",
                              "ജൂലൈ", "ഓഗസ്റ്റ്", "സെപ്റ്റംബർ", "ഒക്ടോബർ", "നവംബർ", "ഡിസംബർ"];
            var month = monthNames[date.getMonth()];
            var year = date.getFullYear();
            return month + " " + year;
        } catch(e) {
            return dateString;
        }
    }
    
    let currentRequest = null;
    
    async function checkFee() {
        const mobile = document.getElementById("mobile").value.trim();
        
        if (mobile.length !== 10 || isNaN(mobile)) {
            showError("10 അക്ക മൊബൈൽ നമ്പർ ശരിയായി നൽകുക.");
            return;
        }
        
        const btn = document.getElementById("checkBtn");
        btn.disabled = true;
        btn.style.opacity = "0.7";
        document.getElementById("loader").style.display = "block";
        document.getElementById("result").innerHTML = "";
        
        // Cancel previous request if any
        if (currentRequest) {
            currentRequest.abort();
        }
        
        // Use fetch with timeout (faster than JSONP)
        const controller = new AbortController();
        currentRequest = controller;
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        
        try {
            const url = `${API_URL}?mobile=${encodeURIComponent(mobile)}`;
            console.log("Fetching:", url);
            
            const response = await fetch(url, {
                method: 'GET',
                signal: controller.signal,
                headers: {
                    'Accept': 'application/json'
                }
            });
            
            clearTimeout(timeoutId);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            console.log("Response:", data);
            
            if (data && data.success !== undefined) {
                displayResult(data);
            } else {
                showError("വിവരങ്ങൾ ലഭ്യമല്ല.");
            }
            
        } catch (err) {
            console.error("Error:", err);
            if (err.name === 'AbortError') {
                showError("സമയം കഴിഞ്ഞു. ഇൻറർനെറ്റ് കണക്ഷൻ പരിശോധിക്കുക.");
            } else {
                showError("സെർവറുമായി ബന്ധപ്പെടാൻ കഴിഞ്ഞില്ല. \nApps Script 'Anyone' ആയി deploy ചെയ്തിട്ടുണ്ടോ?");
            }
        } finally {
            currentRequest = null;
            btn.disabled = false;
            btn.style.opacity = "1";
            document.getElementById("loader").style.display = "none";
        }
    }
    
    function displayResult(data) {
        const resultDiv = document.getElementById("result");
        
        if (data.success) {
            const formattedLastPaidMonth = formatDateToMalayalam(data.lastPaidMonth);
            const currentMonthFee = (data.pendingMonths || 0) * 200;
            const totalPending = data.totalPending || 0;
            
            const whatsappMsg = `നമസ്കാരം ${data.parentName}%0A%0A📖 *നൂറുസ്സലാം മദ്രസ കമ്പിപ്പാലം*%0A💰 *ബാക്കി തുക:* ₹${totalPending}%0A📅 *അവസാനം അടച്ച മാസം:* ${formattedLastPaidMonth}%0A%0Aദയവായി നിങ്ങളുടെ ഫീസ് അടക്കുക.%0A🙏 നന്ദി.`;
            const whatsappLink = `https://wa.me/91${data.mobile}?text=${whatsappMsg}`;
            
            resultDiv.innerHTML = `
                <div class="result-card">
                    <div class="boxes-grid">
                        <div class="info-box full-width">
                            <div class="info-icon">👪</div>
                            <div class="info-label">രക്ഷിതാവിൻ്റെ പേര്</div>
                            <div class="info-value">${escapeHtml(data.parentName)}</div>
                        </div>
                        
                        <div class="info-box">
                            <div class="info-icon">📅</div>
                            <div class="info-label">അവസാനം അടച്ച മാസം</div>
                            <div class="info-value">${escapeHtml(formattedLastPaidMonth)}</div>
                        </div>
                        
                        <div class="info-box">
                            <div class="info-icon">✅</div>
                            <div class="info-label">അടച്ച മാസങ്ങൾ</div>
                            <div class="info-value">${data.paidMonths} മാസം</div>
                        </div>
                        
                        <div class="info-box">
                            <div class="info-icon">⏳</div>
                            <div class="info-label">ബാക്കി മാസങ്ങൾ</div>
                            <div class="info-value">${data.pendingMonths} മാസം</div>
                        </div>
                        
                        <div class="info-box">
                            <div class="info-icon">💰</div>
                            <div class="info-label">ബാക്കി മാസത്തെ തുക</div>
                            <div class="info-value">₹ ${currentMonthFee.toLocaleString()}</div>
                        </div>
                        
                        <div class="info-box">
                            <div class="info-icon">📜</div>
                            <div class="info-label">മുൻപത്തെ ബാക്കി</div>
                            <div class="info-value">₹ ${(data.previousBalance || 0).toLocaleString()}</div>
                        </div>
                        
                        <div class="info-box full-width">
                            <div class="info-icon">📊</div>
                            <div class="info-label">ആകെ ബാക്കി തുക</div>
                            <div class="info-value ${totalPending > 0 ? 'pending-value' : 'success-value'}" style="font-size:1.4rem;">
                                ${totalPending > 0 ? '⏳ ₹ ' + totalPending.toLocaleString() : '✅ ഫീസ് പൂർണ്ണമായി അടച്ചു'}
                            </div>
                        </div>
                        
                        <div class="info-box full-width">
                            <div class="info-icon">💬</div>
                            <div class="info-label">സന്ദേശം</div>
                            <div class="info-value">${escapeHtml(data.message)}</div>
                        </div>
                    </div>
                    
                    <a href="${whatsappLink}" target="_blank" class="whatsapp-btn">
                        📱 WhatsApp-ൽ വിവരം ലഭിക്കുക
                    </a>
                </div>
            `;
        } else {
            resultDiv.innerHTML = `
                <div class="result-card error">
                    <div class="info-box full-width" style="background:transparent;">
                        <div class="info-icon">❌</div>
                        <div class="info-label">പിശക്</div>
                        <div class="info-value error-value">${escapeHtml(data.message)}</div>
                    </div>
                </div>
            `;
        }
        
        // Scroll to result
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    
    function showError(msg) {
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = `
            <div class="result-card error">
                <div class="info-box full-width" style="background:transparent;">
                    <div class="info-icon">⚠️</div>
                    <div class="info-label">പിശക്</div>
                    <div class="info-value error-value">${escapeHtml(msg)}</div>
                </div>
            </div>
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Enter key support
    document.getElementById("mobile").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            checkFee();
        }
    });
    
    document.getElementById("mobile").focus();
    console.log("✅ Madrasa Fee Checker Ready (Fetch Mode)");
    console.log("📡 API URL:", API_URL);
</script>
</body>
</html>
