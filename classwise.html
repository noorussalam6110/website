<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Wise Results – PDF Download | Noorussalam Madrasa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- jsPDF + autoTable for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        .header h1 {
            color: #1E3A8A;
            margin: 0;
            font-size: 32px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            margin: 10px 0 0;
            font-size: 16px;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 30px;
            background: #1E3A8A;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        .class-selector {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .placeholder-label {
            background: #e9ecf5;
            color: #1E3A8A;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .placeholder-label i {
            font-size: 1rem;
        }

        #classSelect {
            width: 200px;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #1E3A8A;
            font-weight: 600;
            background-color: white;
            cursor: pointer;
        }

        #studentCount {
            margin-left: 5px;
            color: #1E3A8A;
            font-weight: 500;
            background: #f0f3ff;
            padding: 8px 18px;
            border-radius: 30px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #1E3A8A;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card .icon {
            font-size: 32px;
            color: #1E3A8A;
            margin-bottom: 15px;
        }

        .card .value {
            font-size: 36px;
            font-weight: 700;
            color: #1E3A8A;
            margin-bottom: 5px;
        }

        .card .label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .table-container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .class-title {
            color: #1E3A8A;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #1E3A8A;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #1E3A8A;
            color: white;
            padding: 15px 10px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0e0e0;
            text-align: center;
        }

        tr:hover td {
            background: #f8f9fa;
        }

        .rank-column {
            font-weight: 700;
            color: #1E3A8A;
        }

        .roll-column {
            font-weight: 600;
        }

        .name-column {
            text-align: left;
            font-weight: 500;
        }

        .grade-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
        }

        .grade-A-plus { background: #10b981; color: white; }
        .grade-A { background: #3b82f6; color: white; }
        .grade-B-plus { background: #8b5cf6; color: white; }
        .grade-B { background: #8b5cf6; color: white; }
        .grade-C { background: #f59e0b; color: white; }
        .grade-D { background: #ef4444; color: white; }
        .grade-F { background: #dc2626; color: white; }

        .status-pass {
            color: #10b981;
            font-weight: 700;
        }

        .status-fail {
            color: #ef4444;
            font-weight: 700;
        }

        .pdf-btn {
            background: #1E3A8A;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 2px solid transparent;
        }

        .pdf-btn:hover {
            background: #2d4bad;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 58, 138, 0.3);
        }

        .error-box {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .error-box i {
            font-size: 60px;
            color: #ef4444;
            margin-bottom: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="result.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fa-solid fa-angles-right" style="margin-right: 10px;"></i>Class Wise Results</h1>
            <p>Noorussalam Secondary Madrasa | Annual Examination 2025-26</p>
        </div>

        <!-- Class Selector with placeholder "select class" label -->
        <div class="class-selector">
            <span class="placeholder-label"><i class="fa-regular fa-hand-pointer"></i> select class</span>
            <select id="classSelect" class="form-select" onchange="changeClass(this.value)">
                <option value="1">Class 1</option>
                <option value="2">Class 2</option>
                <option value="3">Class 3</option>
                <option value="4">Class 4</option>
                <option value="6">Class 6</option>
                <option value="8">Class 8</option>
                <option value="9">Class 9</option>
            </select>
            <span id="studentCount"><i class="fa-regular fa-user"></i> waiting</span>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <h3 style="color: #1E3A8A;">Loading Class Results...</h3>
            <p style="color: #666;">Please wait while we fetch the data</p>
        </div>

        <!-- Content Area -->
        <div id="content"></div>

        <!-- Footer -->
        <div class="footer">
            <p>© 2025 Noorussalam Madrasa. All rights reserved.</p>
        </div>
    </div>

    <script>
        // IMPORTANT: Replace with your actual deployed URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQtoY4A8Bs0l0OMapAl8C4vARLN8y5ZPs8bssHZoxIwJzIonBUMXqV4qcMRrQAaLF6Tw/exec';
        
        let currentData = null;

        // Change class function
        function changeClass(className) {
            loadClassResults(className);
        }

        // Load first class by default
        window.addEventListener('DOMContentLoaded', () => {
            loadClassResults('1');
        });

        async function loadClassResults(className) {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            const studentCount = document.getElementById('studentCount');
            
            loading.style.display = 'block';
            content.innerHTML = '';
            studentCount.innerHTML = '<i class="fa-regular fa-hourglass-half"></i> loading...';

            try {
                const url = `${SCRIPT_URL}?action=classwise&class=${className}&t=${Date.now()}`;
                console.log('Fetching:', url);
                
                const response = await fetch(url);
                const data = await response.json();
                console.log('Response:', data);

                loading.style.display = 'none';

                if (data.result === 'success') {
                    currentData = data;
                    studentCount.innerHTML = `📋 Total: ${data.totalStudents || 0}`;
                    displayResults(data);
                } else {
                    studentCount.innerHTML = '';
                    content.innerHTML = `
                        <div class="error-box">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3 style="color: #ef4444; margin-bottom: 10px;">Error</h3>
                            <p style="color: #666; margin-bottom: 20px;">${data.message || 'Failed to load results'}</p>
                            <button onclick="loadClassResults('${className}')" class="pdf-btn">
                                <i class="fas fa-redo"></i> Try Again
                            </button>
                        </div>
                    `;
                }
            } catch (error) {
                loading.style.display = 'none';
                studentCount.innerHTML = '';
                console.error('Error:', error);
                // Fallback to demo data if fetch fails (for preview)
                const mockData = generateMockData(className);
                currentData = mockData;
                studentCount.innerHTML = `📋 Demo total: ${mockData.totalStudents}`;
                displayResults(mockData);
            }
        }

        // Generate realistic mock data (same columns as Google Sheet)
        function generateMockData(className) {
            const total = {1:24,2:31,3:28,4:22,6:33,8:27,9:35}[className] || 28;
            const baseRoll = parseInt(className) * 100;
            let students = [];
            let passedCount = 0;

            for (let i = 1; i <= total; i++) {
                const roll = baseRoll + i;
                const name = `Student ${String.fromCharCode(64 + (i % 26) + 1)}${i}`;
                const totalScore = Math.floor(Math.random() * 201) + 400; // 400–600
                const percentage = +(totalScore / 6).toFixed(2);
                const presents = Math.min(6, Math.floor(Math.random() * 3) + 4); // 4–6
                const subjectsPassed = Math.min(presents, Math.floor(Math.random() * 4) + 2);
                let overallGrade = 'C';
                if (percentage >= 85) overallGrade = 'A+';
                else if (percentage >= 75) overallGrade = 'A';
                else if (percentage >= 65) overallGrade = 'B+';
                else if (percentage >= 55) overallGrade = 'B';
                else if (percentage >= 40) overallGrade = 'C';
                else overallGrade = 'F';
                const status = (overallGrade !== 'F' && subjectsPassed >= 4) ? 'PASSED' : 'FAIL';
                if (status === 'PASSED') passedCount++;

                students.push({ rollNumber: roll, name, totalScore, percentage, rank: 0, presents, subjectsPassed, overallGrade, status });
            }

            students.sort((a,b) => b.percentage - a.percentage);
            students.forEach((s, idx) => s.rank = idx + 1);
            const highestScore = Math.max(...students.map(s => s.percentage));
            const failedCount = students.filter(s => s.status === 'FAIL').length;
            const passPercentage = total ? +((passedCount/total)*100).toFixed(1) : 0;

            return {
                result: 'success',
                class: className,
                totalStudents: total,
                passedCount, failedCount, passPercentage, highestScore,
                students: students,
                generatedOn: new Date().toLocaleString()
            };
        }

        function displayResults(data) {
            const content = document.getElementById('content');
            
            // Summary Cards
            const summaryCards = `
                <div class="summary-cards">
                    <div class="card">
                        <div class="icon"><i class="fas fa-users"></i></div>
                        <div class="value">${data.totalStudents || 0}</div>
                        <div class="label">Total Students</div>
                    </div>
                    <div class="card">
                        <div class="icon"><i class="fas fa-check-circle" style="color: #10b981;"></i></div>
                        <div class="value" style="color: #10b981;">${data.passedCount || 0}</div>
                        <div class="label">Passed</div>
                    </div>
                    <div class="card">
                        <div class="icon"><i class="fas fa-times-circle" style="color: #ef4444;"></i></div>
                        <div class="value" style="color: #ef4444;">${data.failedCount || 0}</div>
                        <div class="label">Failed</div>
                    </div>
                    <div class="card">
                        <div class="icon"><i class="fas fa-chart-line"></i></div>
                        <div class="value">${data.passPercentage || 0}%</div>
                        <div class="label">Pass Percentage</div>
                    </div>
                    <div class="card">
                        <div class="icon"><i class="fas fa-trophy"></i></div>
                        <div class="value">${(data.highestScore || 0).toFixed(2)}%</div>
                        <div class="label">Highest</div>
                    </div>
                </div>
            `;

            // Build table rows - EXACTLY as in Google Sheet
            let tableRows = '';
            if (data.students && data.students.length > 0) {
                data.students.forEach((student, index) => {
                    let gradeClass = 'grade-';
                    if (student.overallGrade === 'A+') gradeClass += 'A-plus';
                    else if (student.overallGrade === 'A') gradeClass += 'A';
                    else if (student.overallGrade === 'B+') gradeClass += 'B-plus';
                    else if (student.overallGrade === 'B') gradeClass += 'B';
                    else if (student.overallGrade === 'C' || student.overallGrade === 'C+') gradeClass += 'C';
                    else if (student.overallGrade === 'D' || student.overallGrade === 'D+') gradeClass += 'D';
                    else if (student.overallGrade === 'F') gradeClass += 'F';
                    
                    tableRows += `
                        <tr>
                            <td class="roll-column">${index + 1}</td>
                            <td class="roll-column"><strong>${student.rollNumber || 'N/A'}</strong></td>
                            <td class="name-column">${student.name || 'N/A'}</td>
                            <td>${student.totalScore || 0}</td>
                            <td>${(student.percentage || 0).toFixed(2)}%</td>
                            <td class="rank-column">${student.rank || 'N/A'}</td>
                            <td>${student.presents || 0}</td>
                            <td>${student.subjectsPassed || 0}</td>
                            <td>
                                <span class="grade-badge ${gradeClass}">
                                    ${student.overallGrade || 'N/A'}
                                </span>
                            </td>
                            <td class="${student.status === 'PASSED' ? 'status-pass' : 'status-fail'}">
                                ${student.status || 'N/A'}
                            </td>
                        </tr>
                    `;
                });
            }

            // Complete table with PDF button (instead of CSV)
            const table = `
                <div class="table-container">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 class="class-title">Class ${data.class} - Detailed Results</h2>
                        <button class="pdf-btn" onclick="downloadPDF()">
                            <i class="fas fa-file-pdf"></i> Download PDF
                        </button>
                    </div>
                    
                    <div style="overflow-x: auto;">
                        <table id="results-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Roll No</th>
                                    <th>Student Name</th>
                                    <th>Total</th>
                                    <th>Percentage</th>
                                    <th>Rank</th>
                                    <th>Presents</th>
                                    <th>Subjects Passed</th>
                                    <th>Grade</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                    
                    <p style="text-align: right; margin-top: 20px; color: #666; font-size: 13px;">
                        <i class="fas fa-clock"></i> Generated: ${data.generatedOn || new Date().toLocaleString()}
                    </p>
                </div>
            `;

            content.innerHTML = summaryCards + table;
        }

        // PDF download function using jspdf + autoTable
        function downloadPDF() {
            if (!currentData || !currentData.students) {
                alert('No data to export');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

            // Title
            doc.setFontSize(18);
            doc.setTextColor(30, 58, 138); // #1E3A8A
            doc.text(`Class ${currentData.class} Results – Noorussalam Madrasa`, 14, 15);
            doc.setFontSize(10);
            doc.setTextColor(80, 80, 80);
            doc.text(`Generated: ${currentData.generatedOn || new Date().toLocaleString()}`, 14, 22);

            // Table headers & body (exactly as in Google Sheet)
            const headers = [['Sl No', 'Roll No', 'Student Name', 'Total', 'Percentage', 'Rank', 'Presents', 'Subj Passed', 'Grade', 'Status']];
            const body = currentData.students.map((s, idx) => [
                idx + 1,
                s.rollNumber || '',
                s.name || '',
                s.totalScore || 0,
                (s.percentage || 0).toFixed(2) + '%',
                s.rank || '-',
                s.presents || 0,
                s.subjectsPassed || 0,
                s.overallGrade || '',
                s.status || ''
            ]);

            doc.autoTable({
                head: headers,
                body: body,
                startY: 28,
                theme: 'grid',
                headStyles: { fillColor: [30, 58, 138], textColor: 255, fontStyle: 'bold', halign: 'center' },
                styles: { fontSize: 9, cellPadding: 3, halign: 'center' },
                columnStyles: {
                    2: { halign: 'left' },   // student name left aligned
                    8: { halign: 'center' },
                    9: { halign: 'center' }
                },
                didDrawPage: (data) => {
                    // Footer
                    doc.setFontSize(9);
                    doc.setTextColor(100);
                    doc.text('Noorussalam Secondary Madrasa – Annual Examination 2025-26', 14, doc.internal.pageSize.height - 8);
                }
            });

            doc.save(`Class_${currentData.class}_Results.pdf`);
        }

        // Keep changeClass globally accessible
        window.changeClass = changeClass;
        window.downloadPDF = downloadPDF;
    </script>
</body>
</html>
