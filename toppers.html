<!doctype html>
<html lang="ml">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
<title>Noorussalam Toppers</title>

<!-- Anek Malayalam + modern font -->
<link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --gold: #D4AF37;
  --gold-light: #F5E6A3;
  --navy: #0A1C3A;
  --navy-light: #1E3A6F;
  --cream: #FFF9F0;
  --cream-dark: #F4E8D1;
  --white: #ffffff;
  --gray: #5A6E8A;
  --success: #10b981;
  --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
  --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.08);
  --radius: 20px;
  --radius-sm: 14px;
}

body {
  font-family: "Anek Malayalam", sans-serif;
  background: linear-gradient(145deg, var(--cream) 0%, #FDF6E3 100%);
  color: var(--navy);
  min-height: 100vh;
  padding: 16px;
  position: relative;
}

.wrap {
  max-width: 1300px;
  margin: 0 auto;
}

/* ===== MOVING TICKER ===== */
.topper-ticker {
  background: linear-gradient(90deg, var(--navy), var(--navy-light), var(--gold), var(--navy-light), var(--navy));
  background-size: 300% auto;
  padding: 14px 0;
  border-radius: 60px;
  margin-bottom: 24px;
  box-shadow: 0 8px 20px rgba(10, 28, 58, 0.3);
  border: 1px solid rgba(212, 175, 55, 0.5);
  overflow: hidden;
}

.ticker-wrapper {
  overflow: hidden;
  white-space: nowrap;
  mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
}

.ticker-content {
  display: inline-block;
  animation: moveTicker 32s linear infinite;
  font-weight: 600;
  font-size: 0.9rem;
  letter-spacing: 0.5px;
}

.ticker-content span {
  display: inline-flex;
  align-items: center;
  margin-right: 28px;
  background: rgba(255,255,255,0.12);
  padding: 6px 18px;
  border-radius: 40px;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(212, 175, 55, 0.4);
  color: white;
}

.ticker-content i { margin: 0 6px; }
.gold-star { color: var(--gold); text-shadow: 0 0 4px rgba(0,0,0,0.3); }
.silver-star { color: #C0C0C0; }

@keyframes moveTicker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.topper-ticker:hover .ticker-content { animation-play-state: paused; }

/* ===== HEADER ===== */
.header {
  text-align: center;
  background: var(--white);
  border-radius: var(--radius);
  padding: 30px 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  position: relative;
  border-bottom: 4px solid var(--gold);
}

.header h1 {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--navy) 0%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}

.tagline {
  display: inline-block;
  background: linear-gradient(95deg, var(--navy), var(--navy-light));
  color: var(--gold);
  padding: 8px 24px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 0.85rem;
  border: 1px solid rgba(212, 175, 55, 0.5);
}

/* ===== SELECTION CARD ===== */
.selection-container {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  border-top: 3px solid var(--gold);
}

.selection-header h3 {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--navy);
  text-align: center;
  margin-bottom: 20px;
}

.selection-box {
  max-width: 550px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.select-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.select-group label {
  font-weight: 700;
  color: var(--navy);
  font-size: 1rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.select-group select {
  padding: 14px 18px;
  border: 2px solid #E8E0C8;
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 500;
  background: var(--cream);
  transition: all 0.2s;
  font-family: inherit;
}

.select-group select:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
}

.action-buttons {
  display: flex;
  gap: 15px;
  margin-top: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

.action-btn {
  padding: 12px 24px;
  border: none;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: all 0.25s;
  box-shadow: var(--shadow-sm);
}

.action-btn.primary {
  background: linear-gradient(105deg, var(--navy), var(--navy-light));
  color: var(--gold);
}
.action-btn.secondary {
  background: #EFE6D6;
  color: var(--navy);
  border: 1px solid #DDD0B8;
}
.action-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* ===== RESULT DISPLAY - WITHOUT INFO BOXES ===== */
.result-display {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  display: none;
  border-left: 5px solid var(--gold);
}

.result-header h3 {
  font-size: 1.4rem;
  color: var(--navy);
  text-align: center;
  margin-bottom: 5px;
}
.result-header p {
  text-align: center;
  color: var(--gray);
  font-size: 0.85rem;
  margin-bottom: 20px;
}

/* Info boxes removed - only photo section remains */
.photo-section {
  text-align: center;
  margin: 20px 0;
}
.photo-container {
  width: 220px;
  height: 220px;
  margin: 0 auto 15px;
  border-radius: 50%;
  overflow: hidden;
  border: 4px solid var(--gold);
  box-shadow: var(--shadow);
  background: #F0E9DD;
}
#studentPhoto { width: 100%; height: 100%; object-fit: cover; }
.upload-btn {
  background: linear-gradient(105deg, var(--navy), var(--navy-light));
  color: var(--gold);
  border: none;
  padding: 12px 28px;
  border-radius: 50px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: 0.2s;
}
.upload-btn:hover { transform: scale(1.02); box-shadow: var(--shadow-sm); }

.preview-btn {
  background: linear-gradient(105deg, var(--gold), #C9A82E);
  color: var(--navy);
  border: none;
  padding: 16px 28px;
  border-radius: 60px;
  font-weight: 800;
  font-size: 1rem;
  cursor: pointer;
  width: 100%;
  max-width: 360px;
  margin: 20px auto 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: 0.25s;
  box-shadow: var(--shadow);
}
.preview-btn:hover { transform: translateY(-3px); filter: brightness(1.02); }

/* ===== CROP MODAL ===== */
.crop-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(10, 28, 58, 0.95);
  backdrop-filter: blur(8px);
  z-index: 10050;
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.25s ease;
}
.crop-modal.active {
  display: flex;
}
.modal-box {
  background: var(--white);
  border-radius: 32px;
  width: 90%;
  max-width: 750px;
  padding: 20px;
  box-shadow: 0 30px 45px rgba(0, 0, 0, 0.5);
  border: 2px solid var(--gold);
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--gold);
  margin-bottom: 15px;
}
.modal-header h3 {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--navy);
}
.modal-close {
  font-size: 2rem;
  cursor: pointer;
  background: none;
  border: none;
  color: var(--gray);
  transition: 0.2s;
}
.modal-close:hover { color: #ef4444; transform: scale(1.1); }
.crop-container {
  margin: 15px 0;
  background: #ece1cf;
  border-radius: 16px;
  overflow: hidden;
  max-height: 55vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.crop-container img { max-width: 100%; display: block; }
.modal-buttons {
  display: flex;
  justify-content: flex-end;
  gap: 16px;
  margin-top: 18px;
}
.btn-crop-save {
  background: var(--gold);
  border: none;
  padding: 10px 24px;
  border-radius: 60px;
  font-weight: 800;
  color: var(--navy);
  cursor: pointer;
}
.btn-cancel-crop {
  background: #e2d4c0;
  border: none;
  padding: 10px 24px;
  border-radius: 60px;
  font-weight: 700;
  color: #5a3e1f;
  cursor: pointer;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px 20px;
  margin-top: 20px;
  border-top: 3px solid var(--gold);
}
.footer h3 { color: var(--navy); margin-bottom: 8px; }
.footer p { color: var(--gray); font-size: 0.8rem; }

/* ===== FLOATING HOME ===== */
.floating-home-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 52px;
  height: 52px;
  background: var(--navy);
  color: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  z-index: 1000;
  transition: 0.2s;
  border: 2px solid var(--gold);
}
.floating-home-btn i { font-size: 1.5rem; }
.floating-home-btn:hover { transform: scale(1.08); background: var(--navy-light); }

/* ===== MODAL / PREVIEW ===== */
#certificatePreview {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10, 28, 58, 0.97);
  z-index: 10000;
  overflow: auto;
  padding: 20px;
  backdrop-filter: blur(12px);
}
.certificate-canvas {
  background: white;
  width: 100%;
  max-width: 700px;
  margin: 40px auto 20px;
  border-radius: 24px;
  box-shadow: 0 25px 50px -12px black;
  display: block;
  border: 3px solid var(--gold);
}
.close-preview {
  position: fixed;
  top: 20px;
  right: 25px;
  font-size: 32px;
  color: white;
  background: rgba(212,175,55,0.2);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(5px);
  border: 2px solid var(--gold);
}
.close-preview:hover { background: #ef4444; transform: rotate(90deg); }

.preview-buttons {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
  z-index: 10001;
  background: rgba(10,28,58,0.85);
  backdrop-filter: blur(12px);
  padding: 12px 24px;
  border-radius: 60px;
  border: 1px solid var(--gold);
}
.preview-buttons button {
  padding: 12px 24px;
  border-radius: 50px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: 0.2s;
}
.preview-buttons button:first-child { background: var(--gold); color: var(--navy); }
.preview-buttons button:last-child { background: var(--navy); color: var(--gold); }
.preview-buttons button:hover { transform: translateY(-2px); }

.loading {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10,28,58,0.95);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  backdrop-filter: blur(10px);
}
.loading-spinner { width: 55px; height: 55px; border: 4px solid rgba(255,215,0,0.2); border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
#loadingText { color: white; font-weight: 500; }

.success-animation {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10003;
  display: none;
}
.success-checkmark { width: 70px; height: 70px; stroke: white; stroke-width: 2; background: var(--success); border-radius: 50%; }

@media (max-width: 680px) {
  .header h1 { font-size: 26px; }
  .photo-container { width: 170px; height: 170px; }
  .action-buttons { flex-direction: column; }
  .action-btn { justify-content: center; }
  .preview-buttons { flex-direction: column; width: 90%; bottom: 20px; }
  .preview-buttons button { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="wrap">
  <header class="header">
    <h1>NOORUSSALAM MADRASA</h1>
    <p class="tagline">🌟 High Achievers 2026 🌟</p>
  </header>

  <div class="topper-ticker">
    <div class="ticker-wrapper"><div class="ticker-content" id="tickerContent"></div></div>
  </div>

  <div class="selection-container">
    <div class="selection-header"><h3><i class="fas fa-trophy" style="color:var(--gold);"></i>തെരഞ്ഞെടുക്കുക</h3></div>
    <div class="selection-box">
      <div class="select-group"><label><i class="fas fa-chalkboard-user"></i> ക്ലാസ്</label><select id="classSelect"><option value="">-- ക്ലാസ് തിരഞ്ഞെടുക്കൂ --</option><option value="1">Class 1</option><option value="2">Class 2</option><option value="3">Class 3</option><option value="4">Class 4</option><option value="5">Class 5</option><option value="6">Class 6</option><option value="7">Class 7</option><option value="8">Class 8</option><option value="9">Class 9</option><option value="10">Class 10</option></select></div>
      <div class="select-group"><label><i class="fas fa-user-graduate"></i> ടോപ്പർ</label><select id="studentSelect" disabled><option>-- ആദ്യം ക്ലാസ് തിരഞ്ഞെടുക്കുക --</option></select></div>
      <div class="action-buttons"><button class="action-btn primary" onclick="showSelectedTopper()"><i class="fas fa-eye"></i> ടോപ്പറെ കാണുക</button><button class="action-btn secondary" onclick="clearSelection()"><i class="fas fa-undo-alt"></i> റീസെറ്റ്</button></div>
    </div>
  </div>

  <!-- Result Display - Without Information Boxes -->
  <div class="result-display" id="resultDisplay">
    <div class="result-header"><h3>🏅 സെലക്ട് ചെയ്തു</h3><p>ഫോട്ടോ ക്രോപ്പ് ചെയ്ത് അപ്ലോഡ് ചെയ്യുക</p></div>
    <div class="photo-section">
      <div class="photo-container">
        <img id="studentPhoto" src="">
      </div>
      <input type="file" id="photoUpload" accept="image/*" style="display:none">
      <button class="upload-btn" onclick="openCropModal()"><i class="fas fa-crop-alt"></i> ഫോട്ടോ അപ്ലോഡ് ചെയ്യുക</button>
    </div>
    <button class="preview-btn" onclick="previewCertificate()"><i class="fas fa-certificate"></i> പോസ്റ്റർ കാണുക</button>
  </div>

  <footer class="footer"><h3>Noorussalam Madrasa</h3><p>Designed By Suhail Kerala | ✨ RiseUp Brand ✨</p></footer>
</div>

<!-- CROP MODAL -->
<div id="cropModal" class="crop-modal">
  <div class="modal-box">
    <div class="modal-header"><h3>✂️ ഫോട്ടോ ക്രോപ്പ് ചെയ്യുക</h3><button class="modal-close" id="closeModalBtn">&times;</button></div>
    <div class="crop-container"><img id="modalCropImage" style="max-width:100%; display:block;"></div>
    <div class="modal-buttons"><button id="modalCancelBtn" class="btn-cancel-crop">❌ റദ്ദാക്കുക</button><button id="modalCropSaveBtn" class="btn-crop-save">✔️ ക്രോപ്പ് & സേവ്</button></div>
  </div>
</div>

<div class="floating-home-btn" onclick="window.location.href='index.html'"><i class="fas fa-home"></i></div>
<div class="loading" id="loading"><div class="loading-spinner"></div><p id="loadingText">Generating Certificate...</p></div>
<div id="certificatePreview"><div class="close-preview" onclick="closeCertificatePreview()">×</div><canvas id="previewCanvas" class="certificate-canvas"></canvas></div>
<div class="success-animation" id="successAnimation"><svg class="success-checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52"><circle cx="26" cy="26" r="25" fill="none"/><path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/></svg></div>
<audio id="certSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3" preload="auto"></audio>

<script>
const CERT_BG = "https://i.postimg.cc/vBJs8jT4/topper.jpg";
const classesData = {
  "1": [{ name: "AZIM FAIZAN M", mark: "291 / 300", rank: "First" },{ name: "AYISHA ZAHRA P", mark: "278 / 300", rank: "Second" }],
  "2": [{ name: "HINA MEHRIN TK", mark: "298 / 300", rank: "First" },{ name: "AYISHA MEHBIN", mark: "287 / 300", rank: "Second" }],
  "3": [{ name: "NABA FATHIMA V", mark: "344 / 350", rank: "First" },{ name: "RASWAN KP", mark: "316 / 350", rank: "Second" }],
  "4": [{ name: "ISHA MEHRIN", mark: "341 / 350", rank: "First" },{ name: "SHADHA FATHIMA", mark: "337 / 350", rank: "Second" }],
  "5": [{ name: "EMINYASH", mark: "374 / 500", rank: "First" },{ name: "HISANA TK", mark: "364 / 500", rank: "Second" }],
  "6": [{ name: "SANHA M", mark: "276 / 300", rank: "First" },{ name: "ALNA FATHIMA", mark: "260 / 300", rank: "Second" }],
  "7": [{ name: "THANHA SHERIN", mark: "381 / 500", rank: "First" },{ name: "FIDHA KT", mark: "368 / 500", rank: "Second" }],
  "8": [{ name: "ASNA K", mark: "147 / 200", rank: "First" },{ name: "FATHIMA NIHALA P", mark: "139 / 200", rank: "Second" }],
  "9": [{ name: "ADHIL K", mark: "155 / 200", rank: "First" },{ name: "RINSINA PK", mark: "150 / 200", rank: "Second" }],
  "10": [{ name: "FATHIMA RIYA T", mark: "291 / 400", rank: "First" },{ name: "NASHVA NAHAN M", mark: "268 / 400", rank: "Second" }]
};

// Build ticker
function buildTickerHTML() {
  let html = '';
  for(let cls of Object.keys(classesData).sort()) {
    const first = classesData[cls].find(s => s.rank === 'First');
    const second = classesData[cls].find(s => s.rank === 'Second');
    if(first && second) html += `<span>📘 Class ${cls} : <i class="fas fa-crown gold-star"></i> ${first.name} (${first.mark})  →  <i class="fas fa-star silver-star"></i> ${second.name} (${second.mark})</span>`;
  }
  return html+html;
}
document.getElementById('tickerContent').innerHTML = buildTickerHTML();

// Global variables
let selectedStudent = null;
let uploadedPhoto = null;
let cropperInstance = null;

// Update student list when class changes
function updateStudentList() {
  const cls = document.getElementById('classSelect').value;
  const studentSelect = document.getElementById('studentSelect');
  studentSelect.innerHTML = '<option value="">-- ടോപ്പർ തിരഞ്ഞെടുക്കുക --</option>';
  studentSelect.disabled = !cls;
  if(cls && classesData[cls]) {
    classesData[cls].forEach((student, idx) => {
      const option = document.createElement('option');
      option.value = idx;
      option.textContent = `${student.name} - ${student.rank} (${student.mark})`;
      studentSelect.appendChild(option);
    });
  }
}

// Show selected topper details (stores data but doesn't display info boxes)
function showSelectedTopper() {
  const cls = document.getElementById('classSelect').value;
  const idx = document.getElementById('studentSelect').value;
  if(!cls || idx === '') {
    alert('ദയവായി ക്ലാസും ടോപ്പറും തിരഞ്ഞെടുക്കുക');
    return;
  }
  selectedStudent = { ...classesData[cls][parseInt(idx)], class: cls };
  
  // Load saved photo if exists
  const saved = localStorage.getItem(`photo_${cls}_${idx}`);
  if(saved) { 
    uploadedPhoto = saved; 
    document.getElementById('studentPhoto').src = saved; 
  } else { 
    uploadedPhoto = null; 
    document.getElementById('studentPhoto').src = ''; 
  }
  document.getElementById('resultDisplay').style.display = 'block';
  document.getElementById('resultDisplay').scrollIntoView({ behavior: 'smooth' });
}

// Clear selection
function clearSelection() {
  document.getElementById('classSelect').value = '';
  document.getElementById('studentSelect').innerHTML = '<option>-- ആദ്യം ക്ലാസ് തിരഞ്ഞെടുക്കുക --</option>';
  document.getElementById('studentSelect').disabled = true;
  document.getElementById('resultDisplay').style.display = 'none';
  selectedStudent = null;
  uploadedPhoto = null;
}

// Crop modal functions
function openCropModal() {
  if(!selectedStudent) {
    alert('ദയവായി ആദ്യം ടോപ്പറെ തിരഞ്ഞെടുക്കുക');
    return;
  }
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/jpeg, image/png, image/jpg';
  fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('modalCropImage').src = ev.target.result;
      document.getElementById('cropModal').classList.add('active');
      document.getElementById('modalCropImage').onload = () => {
        if(cropperInstance) cropperInstance.destroy();
        cropperInstance = new Cropper(document.getElementById('modalCropImage'), {
          aspectRatio: 1,
          viewMode: 2,
          dragMode: 'move',
          autoCropArea: 0.9,
          cropBoxMovable: true,
          cropBoxResizable: true,
          zoomable: true,
          background: true,
          responsive: true,
          center: true,
        });
      };
    };
    reader.readAsDataURL(file);
  };
  fileInput.click();
}

function closeCropModal() {
  if(cropperInstance) {
    cropperInstance.destroy();
    cropperInstance = null;
  }
  document.getElementById('cropModal').classList.remove('active');
  document.getElementById('modalCropImage').src = '';
}

function saveCroppedImage() {
  if(!cropperInstance) {
    alert('ക്രോപ്പ് ടൂൾ പ്രവർത്തന സജ്ജമല്ല');
    return;
  }
  const croppedCanvas = cropperInstance.getCroppedCanvas({ width: 800, height: 800 });
  if(!croppedCanvas) {
    alert('ക്രോപ്പ് ചെയ്യുന്നതിൽ പിശക്');
    return;
  }
  const croppedImageData = croppedCanvas.toDataURL('image/png');
  uploadedPhoto = croppedImageData;
  document.getElementById('studentPhoto').src = croppedImageData;
  
  // Save to localStorage
  const cls = document.getElementById('classSelect').value;
  const idx = document.getElementById('studentSelect').value;
  if(cls && idx !== '') {
    localStorage.setItem(`photo_${cls}_${idx}`, croppedImageData);
  }
  closeCropModal();
  showNotification('സേവ് ചെയ്തു!', 'success');
}

function showNotification(msg, type) {
  let div = document.createElement('div');
  div.style.cssText = `position:fixed;bottom:80px;right:20px;background:${type==='success'?'#10b981':'#3b82f6'};color:white;padding:12px 20px;border-radius:40px;z-index:10000;font-weight:500;box-shadow:0 10px 20px rgba(0,0,0,0.2);`;
  div.innerHTML = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}

function showLoading(txt) { document.getElementById('loadingText').innerText = txt; document.getElementById('loading').style.display = 'flex'; }
function hideLoading() { document.getElementById('loading').style.display = 'none'; }

function loadImage(src) {
  return new Promise((resolve, reject) => {
    let img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject();
    img.src = src;
  });
}

// POSTER WITH CLASS AND POSITION IN SINGLE LINE
async function renderCertificateCanvas(name, cls, mark, rank, photo) {
  const w = 2400, h = 3200;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  try {
    const bg = await loadImage(CERT_BG);
    ctx.drawImage(bg, 0, 0, w, h);
    const cx = w/2, cy = 1600, r = 400;
    if(photo) {
      try {
        let img = await loadImage(photo);
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.clip();
        let dw, dh;
        if(img.width > img.height) { dh = r*2; dw = img.width * (dh / img.height); }
        else { dw = r*2; dh = img.height * (dw / img.width); }
        ctx.drawImage(img, cx - dw/2, cy - dh/2, dw, dh);
        ctx.restore();
      } catch(e) { drawPlaceholder(ctx, cx, cy, r); }
    } else { drawPlaceholder(ctx, cx, cy, r); }
    
    ctx.shadowColor = 'rgba(0,0,0,0.2)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 3;
    
    // Student Name
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 95px "Anek Malayalam"';
    ctx.textAlign = 'center';
    ctx.fillText(name, cx, 2180);
    
    // SINGLE LINE: "Class X - TOPPER" or "Class X - SECOND PLACE"
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 70px "Anek Malayalam"';
    const positionText = rank === 'First' ? 'TOPPER' : 'SECOND PLACE';
    const classAndPosition = `Class ${cls} - ${positionText}`;
    ctx.fillText(classAndPosition, cx, 2360);
    
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
    return canvas;
  } catch(e) { 
    console.error("Render error:", e);
    throw new Error("Background failed"); 
  }
}

function drawPlaceholder(ctx, cx, cy, r) {
  ctx.fillStyle = '#F4E8D1';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000000';
  ctx.font = 'bold 85px "Anek Malayalam"';
  ctx.fillText('📸', cx, cy + 25);
}

async function previewCertificate() {
  if(!selectedStudent) { alert('ആദ്യം ടോപ്പറെ തിരഞ്ഞെടുക്കുക'); return; }
  showLoading('Generating poster...');
  try {
    const canvas = await renderCertificateCanvas(selectedStudent.name, selectedStudent.class, selectedStudent.mark, selectedStudent.rank, uploadedPhoto);
    hideLoading();
    const previewCanvas = document.getElementById('previewCanvas');
    previewCanvas.width = 1600;
    previewCanvas.height = 2134;
    const pctx = previewCanvas.getContext('2d');
    pctx.drawImage(canvas, 0, 0, 2400, 3200, 0, 0, 1600, 2134);
    document.getElementById('certificatePreview').style.display = 'block';
    let oldDiv = document.querySelector('.preview-buttons');
    if(oldDiv) oldDiv.remove();
    let btnDiv = document.createElement('div');
    btnDiv.className = 'preview-buttons';
    btnDiv.innerHTML = `<button onclick="downloadCertificate('png')"><i class="fas fa-download"></i> PNG</button><button onclick="downloadCertificate('pdf')"><i class="fas fa-file-pdf"></i> PDF</button>`;
    document.getElementById('certificatePreview').appendChild(btnDiv);
  } catch(e) { hideLoading(); alert('Error generating poster'); }
}

function closeCertificatePreview() {
  document.getElementById('certificatePreview').style.display = 'none';
  let btns = document.querySelector('.preview-buttons');
  if(btns) btns.remove();
}

async function downloadCertificate(type) {
  if(!selectedStudent) return;
  showLoading('Creating file...');
  try {
    const canvas = await renderCertificateCanvas(selectedStudent.name, selectedStudent.class, selectedStudent.mark, selectedStudent.rank, uploadedPhoto);
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = canvas.width;
    finalCanvas.height = canvas.height;
    const fctx = finalCanvas.getContext('2d');
    fctx.fillStyle = '#fff';
    fctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
    fctx.drawImage(canvas, 0, 0);
    const img = finalCanvas.toDataURL('image/png');
    const fileName = `Noorussalam_Class${selectedStudent.class}_${selectedStudent.rank}_${selectedStudent.name.replace(/\s/g, '_')}`;
    if(type === 'png') {
      let a = document.createElement('a');
      a.href = img;
      a.download = `${fileName}.png`;
      a.click();
    } else if(type === 'pdf') {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'px', format: [2400, 3200] });
      pdf.addImage(img, 'PNG', 0, 0, 2400, 3200);
      pdf.save(`${fileName}.pdf`);
    }
    confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#D4AF37', '#0A1C3A'] });
    const sound = document.getElementById("certSound");
    if(sound) { sound.currentTime = 0; sound.play().catch(e => console.log("audio fail")); }
    hideLoading();
    showNotification('✅ Poster Downloaded!', 'success');
  } catch(e) { hideLoading(); alert('Download failed'); }
}

// Event bindings
document.getElementById('classSelect').addEventListener('change', updateStudentList);
document.getElementById('closeModalBtn').addEventListener('click', closeCropModal);
document.getElementById('modalCancelBtn').addEventListener('click', closeCropModal);
document.getElementById('modalCropSaveBtn').addEventListener('click', saveCroppedImage);
document.getElementById('cropModal').addEventListener('click', (e) => { if(e.target === document.getElementById('cropModal')) closeCropModal(); });

// Expose functions globally
window.updateStudentList = updateStudentList;
window.showSelectedTopper = showSelectedTopper;
window.clearSelection = clearSelection;
window.openCropModal = openCropModal;
window.previewCertificate = previewCertificate;
window.closeCertificatePreview = closeCertificatePreview;
window.downloadCertificate = downloadCertificate;

updateStudentList();
</script>
